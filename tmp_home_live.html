   try{var d=new Date(ballData.ts);time=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}catch(e){}
  }
  // 从 summary 中去掉和 label 重复的前缀
  var desc=(ballData.summary||'').replace(/^.*[:：]\s*/,'').slice(0,30);
  var tip=label+(desc?' · '+desc:'')+(time?' · '+time:'');
  el.setAttribute('data-tooltip',tip.trim());
  el.setAttribute('data-type',ballData.type);
  el.setAttribute('data-ts',ballData.ts||'');

  if(animate){
   el.classList.add('rolling-in');
   el.addEventListener('animationend',function(){
    el.classList.remove('rolling-in');
    el.classList.add('settled');
   },{once:true});
  }else{
   el.classList.add('settled');
   el.style.opacity='1';
  }
  return el;
 }

 function renderBall(ballData,animate){
  var bar=getBar();
  if(!bar) return;
  var el=createBallEl(ballData,animate);
  bar.prepend(el);
  updateBarClass();
 }

 function init(){
  var bar=getBar();
  if(!bar) return;
  var saved=loadBalls();
  for(var i=0;i<saved.length;i++) renderBall(saved[i],false);
  scheduleMidnightClear();
  console.log('[awareness] init, restored '+saved.length+' balls');
 }

 function handleEvent(evtData){
  var ballData={
   type:evtData.type,
   summary:evtData.summary||'',
   ts:evtData.ts||new Date().toISOString(),
   detail:evtData.detail||{}
  };
  var isNew=addBallToStorage(ballData);
  if(!isNew) return;
  renderBall(ballData,true);
 }

 function handleEvents(arr){
  if(!Array.isArray(arr)||arr.length===0) return;
  for(var i=0;i<arr.length;i++){
   (function(idx){
    setTimeout(function(){handleEvent(arr[idx]);},idx*STAGGER_DELAY);
   })(i);
  }
 }

 function startPolling(){
  stopPolling();
  pollCount=0;
  lastPollTs=new Date().toISOString();
  pollTimer=setInterval(function(){
   pollCount++;
   if(pollCount>POLL_MAX){stopPolling();return;}
   var url='/awareness/pending'+(lastPollTs?'?since='+encodeURIComponent(lastPollTs):'');
   fetch(url).then(function(r){return r.json();}).then(function(data){
    if(data.server_ts) lastPollTs=data.server_ts;
    if(data.events && data.events.length>0){
     handleEvents(data.events);
     pollCount=Math.max(0,pollCount-2);
    }
   }).catch(function(){});
  },POLL_INTERVAL);
 }

 function stopPolling(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  pollCount=0;
 }

 function scheduleMidnightClear(){
  var now=new Date();
  var midnight=new Date(now);
  midnight.setHours(24,0,0,0);
  var ms=midnight-now;
  setTimeout(function(){
   clearAllBalls();
   scheduleMidnightClear();
  },ms);
 }

 function clearAllBalls(){
  var bar=getBar();
  if(!bar) return;
  var balls=bar.querySelectorAll('.awareness-ball');
  for(var i=0;i<balls.length;i++){
   (function(el,idx){
    setTimeout(function(){
     el.classList.remove('settled');
     el.classList.add('clearing');
     el.addEventListener('animationend',function(){
      el.remove();
      updateBarClass();
     },{once:true});
    },idx*80);
   })(balls[i],i);
  }
  localStorage.removeItem(STORAGE_KEY);
 }

 return {
  init:init,
  handleEvent:handleEvent,
  handleEvents:handleEvents,
  startPolling:startPolling,
  stopPolling:stopPolling,
  clearAllBalls:clearAllBalls
 };
})();

  if(!stepObj) return;

function _applyStepDetail(stepObj, detail, fullDetail){
  if(!stepObj || !stepObj.detailEl) return;

  stepObj.fullDetail=String(fullDetail||'').trim();
  stepObj.expandable=false;

 }

  status=String(status||'pending');
  if(status==='done') return 'done';
  if(status==='running') return 'running';
  if(status==='waiting_user') return 'waiting-user';
  if(status==='blocked' || status==='error' || status==='failed') return 'error';

 }

 function addStep(card){
  if(pendingState.labelTimer){ clearInterval(pendingState.labelTimer); pendingState.labelTimer=null; }
  hasTrace=true;
  var label=card.label||'';
  var detail=card.detail||'';
  var status=card.status||'running';

  // 更新 spinner 状态文字，隐藏三个点动画
  var statusText=pendingState.status.querySelector('.thinking-status-text');
  if(statusText){
   statusText.textContent=detail||label;
   statusText.style.animation='none';
   statusText.offsetHeight;
   statusText.style.animation='statusFade 0.5s ease';
  }
  var dotsEl=pendingState.status.querySelector('.thinking');
  if(dotsEl) dotsEl.style.display='none';

  // 如果上一个 step 是 running 且 label 不同 → 自动标记为 done
  var steps=pendingState.steps;
  if(steps.length>0){
   var last=steps[steps.length-1];
   if(last.status==='running' && last.label!==label){
    _setStepStatus(last,'done');
   }
  }

  // 如果 label 和上一个相同 → 原地更新
  if(steps.length>0 && steps[steps.length-1].label===label){
   var existing=steps[steps.length-1];
   _applyStepDetail(existing, detail, card.full_detail||'');
   _setStepStatus(existing, status);
   chat.scrollTop=chat.scrollHeight;
   return;
  }

  // 创建新 step-item
 var el=document.createElement('div');
 el.className='step-item '+status;
  var icon=document.createElement('div');
  icon.className='step-icon '+status;
  var mainEl=document.createElement('div');

  var labelEl=document.createElement('div');

  labelEl.textContent=label;
  var detailEl=document.createElement('div');
  detailEl.className='step-detail';
  el.appendChild(icon);
  mainEl.appendChild(labelEl);
  mainEl.appendChild(detailEl);
  el.appendChild(mainEl);
  var stepObj={el:el, label:label, status:status, labelEl:labelEl, detailEl:detailEl, summaryDetail:'', fullDetail:'', expandable:false, expanded:true};
  _applyStepDetail(stepObj, detail, card.full_detail||'');
  pendingState.tracker.appendChild(el);
  steps.push(stepObj);
  chat.scrollTop=chat.scrollHeight;
 }

 function _collapseSteps(){
  var tracker=pendingState.tracker;
  var steps=pendingState.steps;
  if(!tracker || steps.length===0) return;
  // 确保所有 running 变 done
  for(var i=0;i<steps.length;i++){
   if(steps[i].status==='running') _setStepStatus(steps[i],'done');
  }
  tracker.style.display='flex';
  tracker.classList.remove('collapsed');
  var existingToggle=tracker.querySelector('.step-tracker-toggle');
  if(existingToggle) existingToggle.remove();
 }

  }
  if(pendingState.labelTimer){ clearInterval(pendingState.labelTimer); pendingState.labelTimer=null; }
  _collapseSteps();
  // 隐藏 spinner，显示内容区

 var _scrollRAF=0; // scroll 节流
 var _renderTimer=0; // 渐进渲染节流
 var _streamTokenCount=0; // 流式 token 计数，前 N 个无条件滚动
 var _lastRenderedBlockCount=0; // 上次渲染的块数，用于 fade-in 新块

 // 判断是否在底部附近（阈值 120px），避免强制跳视图打断用户回翻
 function _nearBottom(){
  return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 120;
 }

 // ── 渐进式 Markdown 渲染引擎 ──
 // 不再逐字符塞裸文本，而是把累积的 _streamText 整体跑 formatBubbleText，
 // 新出现的块自动带 fade-in 动画，光标始终在末尾。
 function _progressiveRender(){
  _renderTimer=0;
  if(!_streamBubble || !_streamText) return;
  // 用 formatBubbleText 把当前累积文本渲染成结构化 HTML
  var html=formatBubbleText(_streamText);
  // 创建临时容器解析出块元素
  var temp=document.createElement('div');
  temp.innerHTML=html;
  var newBlocks=temp.children;
  var totalBlocks=newBlocks.length;
  // 清空气泡内容（保留光标）
  var cursor=_streamBubble.querySelector('.typing-cursor');
  _streamBubble.innerHTML='';
  // 逐块插入，新块带 fade-in
  for(var bi=0;bi<totalBlocks;bi++){
   var block=newBlocks[0]; // 始终取第一个（因为 appendChild 会从 temp 中移走）
   if(bi>=_lastRenderedBlockCount){
    block.classList.add('block-fade-in');
   }
   _streamBubble.appendChild(block);
  }
  // 光标放末尾
  if(!cursor){cursor=document.createElement('span');cursor.className='typing-cursor';}
  _streamBubble.appendChild(cursor);
  _lastRenderedBlockCount=totalBlocks;
  _streamTokenCount++;
  // 滚动控制
  if(_streamTokenCount<=5 || _nearBottom()){
   if(!_scrollRAF){
    _scrollRAF=requestAnimationFrame(function(){
     chat.scrollTop=chat.scrollHeight;
     _scrollRAF=0;
    });
   }
  }
 }

 function _appendStreamToken(token){
  if(!_streamStarted) _initStreamBubble();
  _streamText+=token;
  // 节流渐进渲染：每 80ms 最多渲染一次，避免高频 DOM 操作
  if(!_renderTimer){
   _renderTimer=setTimeout(_progressiveRender, 80);
  }
 }

 function _finalizeStream(fullText){
  if(!_streamBubble) return;
  // 清除未执行的渐进渲染定时器
  if(_renderTimer){clearTimeout(_renderTimer);_renderTimer=0;}
  // 最终渲染：用完整文本做一次格式化（确保和 reply 事件的文本一致）
  _streamBubble.innerHTML=formatBubbleText(fullText);
  // 移除所有 fade-in 动画类（已经渲染完毕）
  var fadingBlocks=_streamBubble.querySelectorAll('.block-fade-in');
  for(var fi=0;fi<fadingBlocks.length;fi++){fadingBlocks[fi].classList.remove('block-fade-in');}
  // 如果有附带图片，追加到气泡末尾
  if(replyImage){
   var img=document.createElement('img');
   img.className='bubble-image';
   img.src=replyImage;
   img.alt='截图';
   img.style.maxWidth='100%';
   img.style.maxHeight='400px';
   img.style.borderRadius='8px';
   img.style.marginTop='8px';
   img.style.cursor='pointer';
   img.onclick=function(){window.open(replyImage,'_blank');};
   _streamBubble.appendChild(img);
  }
  var meta=_streamBubble.parentNode.querySelector('.msg-meta');
  if(meta&&!meta.querySelector('.msg-copy')){
   var cpBtn=document.createElement('button');
   cpBtn.className='msg-copy';
   cpBtn.textContent=t('chat.copy');
   cpBtn.onclick=function(){navigator.clipboard.writeText(fullText).then(function(){cpBtn.textContent=t('chat.copied');setTimeout(function(){cpBtn.textContent=t('chat.copy');},1200);});};
   meta.appendChild(cpBtn);
  }
  // ── 思考折叠面板（流式路径）──
  if(_showRawThinkingPanel && _thinkingContent && _streamBubble.parentNode){
   var existPanel=_streamBubble.parentNode.querySelector('.thinking-panel');
   if(!existPanel){
    var thinkPanel=document.createElement('details');
    thinkPanel.className='thinking-panel';
    var thinkSummary=document.createElement('summary');
    thinkSummary.textContent='💭 模型思考过程';
    thinkSummary.style.cssText='cursor:pointer;font-size:12px;color:#888;padding:6px 0;user-select:none;';
    var thinkBody=document.createElement('div');
    thinkBody.style.cssText='font-size:12px;color:#999;padding:8px 12px;background:rgba(128,128,128,0.08);border-radius:8px;margin:4px 0 8px;white-space:pre-wrap;line-height:1.5;max-height:300px;overflow-y:auto;';
    thinkBody.textContent=_thinkingContent;
    thinkPanel.appendChild(thinkSummary);
    thinkPanel.appendChild(thinkBody);
    _streamBubble.parentNode.insertBefore(thinkPanel,_streamBubble);
   }
  }
  _collapseSteps();
  chat.scrollTop=chat.scrollHeight;
  if(!pendingState.persisted){
   chatHistory+=pendingState.root.outerHTML;
   trimChatHistory();
   localStorage.setItem('nova_chat_history',chatHistory);
   // 持久化 steps 摘要
   if(pendingState.steps&&pendingState.steps.length>0){
    var stepsMap=JSON.parse(localStorage.getItem('nova_steps_map')||'{}');
    var tsKey=String(Date.now());
    stepsMap[tsKey]=pendingState.steps.map(function(s){
     return {
      label:s.label||'',
      detail:(s.detailEl&&s.detailEl.textContent)||'',
      status:s.status||'done'
     };
    });
    // 只保留最近 200 条
    var keys=Object.keys(stepsMap);
    if(keys.length>200){keys.sort();keys.slice(0,keys.length-200).forEach(function(k){delete stepsMap[k];});}
    localStorage.setItem('nova_steps_map',JSON.stringify(stepsMap));
    pendingState.root.setAttribute('data-steps-key',tsKey);
   }
   pendingState.persisted=true;
  }
  _releaseActivePendingAssistantState(pendingState);
 }

  // ── 思考折叠面板 ──
  if(_showRawThinkingPanel && _thinkingContent){

   var thinkBody=document.createElement('div');
   thinkBody.style.cssText='font-size:12px;color:#999;padding:8px 12px;background:rgba(128,128,128,0.08);border-radius:8px;margin:4px 0 8px;white-space:pre-wrap;line-height:1.5;max-height:300px;overflow-y:auto;';
   thinkBody.textContent=_thinkingContent;
   thinkPanel.appendChild(thinkSummary);
   thinkPanel.appendChild(thinkBody);
   contentArea.appendChild(thinkPanel);
  }

  contentArea.appendChild(bubble);

  // ── 如果有附带图片（如截图），在气泡内渲染 ──
  if(replyImage){
   var img=document.createElement('img');
   img.className='bubble-image';
   img.src=replyImage;
   img.alt='截图';
   img.style.maxWidth='100%';
   img.style.maxHeight='400px';
   img.style.borderRadius='8px';
   img.style.marginTop='8px';
   img.style.cursor='pointer';
   img.onclick=function(){window.open(replyImage,'_blank');};
   bubble.appendChild(img);
  }

  // ── 渐进块动画：解析 markdown 后逐块 fade-in ──
  var formattedHtml=formatBubbleText(text);
  var temp=document.createElement('div');
  temp.innerHTML=formattedHtml;
  var allBlocks=[];
  while(temp.firstChild){allBlocks.push(temp.firstChild);temp.removeChild(temp.firstChild);}

  var blockIdx=0;
  var blockDelay=60; // 每块间隔 ms
  function revealNextBlock(){
   if(blockIdx>=allBlocks.length){
    // 所有块显示完毕 → 持久化
    _collapseSteps();
    chat.scrollTop=chat.scrollHeight;
    if(!pendingState.persisted){
     chatHistory+=pendingState.root.outerHTML;
     trimChatHistory();
     localStorage.setItem('nova_chat_history',chatHistory);
     pendingState.persisted=true;
    }
    _releaseActivePendingAssistantState(pendingState);
    return;
   }
   var block=allBlocks[blockIdx];
   block.classList.add('block-fade-in');
   bubble.appendChild(block);
   blockIdx++;
   if(chat.scrollHeight-chat.scrollTop-chat.clientHeight<120){
    chat.scrollTop=chat.scrollHeight;
   }
   setTimeout(revealNextBlock, blockDelay);
  }
  revealNextBlock();
 }

 try{
  _abortController=new AbortController();
  var imagesBase64=null;
  if(images&&images.length>0){
   imagesBase64=images.map(function(img){
    var commaIdx=img.indexOf(',');
    return commaIdx>=0?img.substring(commaIdx+1):img;
   });
  }
  var resp=await fetch('/chat',{
   method:'POST',
   headers:{'Content-Type':'application/json; charset=utf-8','Accept':'text/event-stream'},
   body:JSON.stringify({message:String(text||t('chat.describe.image')),image:imagesBase64?imagesBase64[0]:null,images:imagesBase64}),
   signal:_abortController.signal
  });

  var reader=resp.body.getReader();
  var decoder=new TextDecoder();
  var buffer='';

  while(true){
   var result=await reader.read();
   if(result.done) break;
   buffer+=decoder.decode(result.value, {stream:true});

   var lines=buffer.split('\n');
   buffer=lines.pop();

   var currentEvent='';
   var currentData='';
   for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(line.startsWith('event:')){
     currentEvent=line.slice(6).trim();
    }else if(line.startsWith('data:')){
     currentData=line.slice(5).trim();
    }else if(line===''){
     if(currentEvent && currentData){
      try{
       var parsed=JSON.parse(currentData);
       if(currentEvent==='trace'){
        addStep(parsed);
        // ── CoD 状态点：轻量级，只更新 5px 指示灯颜色 ──
        try{
         var _det=String(parsed.detail||'');
         if(_det.indexOf('recall_memory')!==-1||_det.indexOf('query_knowledge')!==-1){
          _setCodDot('trace');
         }
        }catch(e){}
       }else if(currentEvent==='plan'){
        _renderPendingPlan(parsed);
       }else if(currentEvent==='reply'){
        replyText=parsed.reply||t('chat.error.retry');
        if(parsed.image) replyImage=parsed.image;
        // 本轮回复完成 → 复位状态点为金色
        try{ setTimeout(function(){_setCodDot('flash');},600); }catch(e){}
       }else if(currentEvent==='agent_step'){
        if(parsed.phase==='complete'){
         for(var si=0;si<pendingState.steps.length;si++){
          if(pendingState.steps[si].status==='running') _setStepStatus(pendingState.steps[si],'done');
         }
        }
       }else if(currentEvent==='thinking'){
        var _thinkingText=String(parsed.content||'').replace(/<\/?think>/ig,' ').trim();
        if(_thinkingText){
         addStep({label:'模型思考',detail:_thinkingText,status:(parsed.status||'done'),full_detail:_thinkingText});
         if(_showRawThinkingPanel) _thinkingContent=_thinkingText;
        }
       }else if(currentEvent==='ask_user'){
        // agent 暂停等用户选择 → 渲染选项卡片
        _renderAskUser(parsed, pendingState);
       }else if(currentEvent==='stream'){
        _appendStreamToken(parsed.token||'');
       }else if(currentEvent==='reply'){
        replyText=parsed.reply||t('chat.error.retry');
        if(parsed.image) replyImage=parsed.image;
       }else if(currentEvent==='repair'){
        repairData=parsed;
       }else if(currentEvent==='awareness'){
        AwarenessManager.handleEvent(parsed);
       }else if(currentEvent==='model_changed'){
        var newModel=parsed.model||'';
        var newName=parsed.model_name||newModel;
        if(newModel){
         window._novaCurrentModel=newModel;
         var el=document.getElementById('modelName');
         if(el) el.textContent=newName||newModel;
         if(typeof _settingsCurrentModel!=='undefined') _settingsCurrentModel=newModel;
         if(typeof loadSettingsModels==='function') loadSettingsModels();
         if(typeof updateImageBtnState==='function') updateImageBtnState();
        }
       }
      }catch(e){}
     }
     currentEvent='';
     currentData='';
    }
   }
  }

  if(_streamStarted){
   // 流式已经显示了内容，用 reply 事件的完整文本做最终格式化
   var finalText=replyText||_streamText||t('chat.error.retry');
   _finalizeStream(finalText);
  }else if(replyText){
   showFinalReply(replyText);
  }else{
   finalizePendingAssistantMessage(pendingState, t('chat.error.retry'));
  }
  if(repairData && repairData.show){ showRepairBar(repairData); }
  _completeTaskProgress();
  AwarenessManager.startPolling();
 }catch(e){
  if(e.name==='AbortError'){
   // 用户点了停止，显示已有的部分回复或提示
   if(_streamStarted&&_streamText){
    _finalizeStream(_streamText);
   }else if(replyText){
    showFinalReply(replyText);
   }else{
    finalizePendingAssistantMessage(pendingState, t('chat.stopped')||'已停止');
   }
  }else{
   finalizePendingAssistantMessage(pendingState, t('chat.error.noconnect'));
  }
 }
 _abortController=null;
 _exitStopMode();
 chat.scrollTop=chat.scrollHeight;
}

// ── 当前任务板（输入框上方） ──
var _sessionTaskPlan=null;
var _taskPlanClearTimer=null;

function _isTaskPlanTerminal(plan){
 if(!plan || !plan.items || !plan.items.length) return true;
 var phase=String(plan.phase||'').trim();
 if(phase==='done' || phase==='failed' || phase==='blocked' || phase==='cancelled') return true;
 var hasRunning=false;
 var hasPending=false;
 var hasWaitingUser=false;
 for(var i=0;i<plan.items.length;i++){
  var status=String((plan.items[i]&&plan.items[i].status)||'pending');
  if(status==='running') hasRunning=true;
  if(status==='pending') hasPending=true;
  if(status==='waiting_user') hasWaitingUser=true;
 }
 return !hasRunning && !hasPending && !hasWaitingUser;
}

function _taskPlanStateLabel(status){
 status=String(status||'pending');
 if(status==='running') return '进行中';
 if(status==='done') return '已完成';
 if(status==='waiting_user') return '待选择';
 if(status==='blocked' || status==='error' || status==='failed') return '卡住';
 return '待执行';
}

function _taskPlanStateIcon(status){
 status=String(status||'pending');
 if(status==='running') return '◉';
 if(status==='done') return '✓';
 if(status==='blocked' || status==='error' || status==='failed') return '!';
 return '○';
}

function _scheduleTaskPlanClear(delayMs){
 if(_taskPlanClearTimer){ clearTimeout(_taskPlanClearTimer); _taskPlanClearTimer=null; }
 _taskPlanClearTimer=setTimeout(function(){
  window._clearSessionTaskPlan();
 }, delayMs||2600);
}

function _renderSessionTaskPlan(){
 var board=document.getElementById('taskPlanBoard');
 if(!board) return;
 if(!_sessionTaskPlan || !_sessionTaskPlan.items || !_sessionTaskPlan.items.length){
  board.style.display='none';
  board.innerHTML='';
  return;
 }
 var plan=_sessionTaskPlan;
 var terminal=_isTaskPlanTerminal(plan);
 board.style.display='';
 board.innerHTML='';
 board.className='task-plan-board'+(terminal?' is-terminal':'');

 var head=document.createElement('div');
 head.className='task-plan-head';
 var goal=document.createElement('div');
 goal.className='task-plan-goal';
 goal.textContent=String(plan.goal||'当前任务');
 var phase=document.createElement('div');
 phase.className='task-plan-phase';
 phase.textContent=String(plan.summary||'正在推进任务');
 head.appendChild(goal);
 head.appendChild(phase);
 board.appendChild(head);

 var list=document.createElement('div');
 list.className='task-plan-list';
 (plan.items||[]).forEach(function(item,idx){
 var row=document.createElement('div');
  var status=String((item&&item.status)||'pending');
  row.className='task-plan-item '+status;

  var index=document.createElement('div');
  index.className='task-plan-index';
  index.textContent=_taskPlanStateIcon(status);
  index.title=_taskPlanStateLabel(status);

  var body=document.createElement('div');
  body.className='task-plan-body';

  var titleRow=document.createElement('div');
  titleRow.className='task-plan-title-row';

  var title=document.createElement('div');
  title.className='task-plan-title';
  title.textContent=String((item&&item.title)||'');

  var state=document.createElement('div');
  state.className='task-plan-state '+status;
  state.textContent=_taskPlanStateLabel(status);

  titleRow.appendChild(title);
  titleRow.appendChild(state);
  body.appendChild(titleRow);

  var detailText=String((item&&item.detail)||'').trim();
  if(detailText){
   var detail=document.createElement('div');
   detail.className='task-plan-detail';
   detail.textContent=detailText;
   body.appendChild(detail);
  }

  row.appendChild(index);
  row.appendChild(body);
  list.appendChild(row);
 });
 board.appendChild(list);
}

window._setSessionTaskPlan=function(plan){
 if(_taskPlanClearTimer){ clearTimeout(_taskPlanClearTimer); _taskPlanClearTimer=null; }
 _sessionTaskPlan=plan&&plan.items&&plan.items.length?plan:null;
 _renderSessionTaskPlan();
 if(_sessionTaskPlan && _isTaskPlanTerminal(_sessionTaskPlan)){
  _scheduleTaskPlanClear(2800);
 }
};

window._clearSessionTaskPlan=function(){
 if(_taskPlanClearTimer){ clearTimeout(_taskPlanClearTimer); _taskPlanClearTimer=null; }
 _sessionTaskPlan=null;
 _renderSessionTaskPlan();
};

function _renderAskUser(data, pendingState){

// ── 语音对话模式（点一次进入，自动循环，再点退出） ──
var _voiceMode = false;

(function(){
 var voiceBtn=document.getElementById('voiceBtn');
 if(!voiceBtn) return;

 var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SpeechRecognition){
  voiceBtn.style.display='none';
  return;
 }

 var recognition=new SpeechRecognition();
 recognition.lang='zh-CN';
 recognition.continuous=true;
 recognition.interimResults=true;

 var isRecording=false;
 var inp=document.getElementById('inp');
 var _silenceTimer=null; // 静默检测：无新结果后自动发送
 var _lastResultTime=0;

 voiceBtn.addEventListener('click',function(e){
  e.preventDefault();
  if(_voiceMode){ exitVoiceMode(); }
  else{ enterVoiceMode(); }
 });

 function enterVoiceMode(){
  _voiceMode=true;
  voiceBtn.classList.add('recording');
  _syncVoiceMode(true);
  startListening();
 }

 function exitVoiceMode(){
  _voiceMode=false;
  voiceBtn.classList.remove('recording');
  _syncVoiceMode(false);
  if(_silenceTimer){ clearTimeout(_silenceTimer); _silenceTimer=null; }
  if(isRecording){ try{ recognition.stop(); }catch(err){} }
  isRecording=false;
  if(inp) inp.placeholder=t('input.placeholder');
 }

 function _syncVoiceMode(enabled){
  fetch('/companion/voice_mode',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({enabled:enabled})
  }).catch(function(){});
 }

 function startListening(){
  if(!_voiceMode) return;
  if(_silenceTimer){ clearTimeout(_silenceTimer); _silenceTimer=null; }
  isRecording=true;
  _lastResultTime=0;
  if(inp){ inp.value=''; inp.placeholder=t('input.listening'); }
  try{ recognition.start(); }catch(err){}
 }

 recognition.onresult=function(e){
  var transcript='';
  var isFinal=false;
  for(var i=0;i<e.results.length;i++){
   transcript+=e.results[i][0].transcript;
   if(e.results[i].isFinal) isFinal=true;
  }
  if(inp) inp.value=transcript;
  _lastResultTime=Date.now();
  // 有最终结果后启动静默计时，1.8秒无新内容自动发送
  if(isFinal && transcript.trim()){
   if(_silenceTimer) clearTimeout(_silenceTimer);
   _silenceTimer=setTimeout(function(){
    if(!_voiceMode) return;
    try{ recognition.stop(); }catch(err){}
   },1800);
  }
 };

 recognition.onend=function(){
  isRecording=false;
  if(_silenceTimer){ clearTimeout(_silenceTimer); _silenceTimer=null; }
  if(!_voiceMode){ if(inp) inp.placeholder='\u4e0e Nova \u5bf9\u8bdd...'; return; }
  var text=(inp&&inp.value||'').trim();
  if(!text){ setTimeout(startListening,500); return; }
  if(inp) inp.placeholder=t('input.waiting');
  var replyIdBefore=_lastReplyIdForVoice||'';
  send();
  waitForReplyThenListen(replyIdBefore);
 };

 recognition.onerror=function(e){
  isRecording=false;
  if(!_voiceMode) return;
  // no-speech / aborted 是正常情况，不要太快重启
  var delay=e.error==='no-speech'?500:e.error==='aborted'?300:1000;
  setTimeout(startListening, delay);
 };

 // 等 Nova 回复完 + TTS 播完再开始听
 function waitForReplyThenListen(replyIdBefore){
  if(!_voiceMode) return;
  var polls=0;
  var gotReply=false;
  var seenTtsStart=false;
  var replyTime=0;
  var timer=setInterval(function(){
   polls++;
   if(!_voiceMode||polls>=100){ clearInterval(timer); if(_voiceMode) startListening(); return; }
   fetch('/companion/state').then(function(r){return r.json();}).then(function(s){
    if(!gotReply){
     // 阶段1：等新回复出现
     if(s.last_reply_id && s.last_reply_id!==replyIdBefore){
      gotReply=true;
      replyTime=Date.now();
      _lastReplyIdForVoice=s.last_reply_id;
      // 用文本长度估算最大等待时间（兜底）
      var text=s.last_reply_full||s.last_reply_summary||'';
      var maxWait=Math.max((text.length/3)*1000+5000, 8000);
      setTimeout(function(){
       clearInterval(timer);
       if(_voiceMode) startListening();
      }, maxWait);
     }
    }else{
     // 阶段2：等 TTS 播完
     if(s.tts_playing){
      seenTtsStart=true;
     }
     if(seenTtsStart && !s.tts_playing){
      // 确认播完了
      clearInterval(timer);
      if(_voiceMode) setTimeout(startListening,300);
     }
     // 如果等了 6 秒还没看到 tts_playing=true，伴侣窗口可能没开
     if(!seenTtsStart && Date.now()-replyTime>6000){
      clearInterval(timer);
      if(_voiceMode) startListening();
     }
    }
   }).catch(function(){});
  },600);
 }
 var _lastReplyIdForVoice='';
})();

var currentMemoryFilter = "all";
var MEM_PAGE_SIZE = 20;
var _memCurrentPage = 1;
var _memFilteredItems = [];

function _memRenderPage() {
  var labelColor = "var(--text-label)";
  var textColor = "var(--text-primary)";
  var cardBg = "var(--bg-card)";
  var borderColor = "var(--border-card)";

  var total = _memFilteredItems.length;
  var totalPages = Math.max(1, Math.ceil(total / MEM_PAGE_SIZE));
  _memCurrentPage = Math.max(1, Math.min(_memCurrentPage, totalPages));

  var start = (_memCurrentPage - 1) * MEM_PAGE_SIZE;
  var pageItems = _memFilteredItems.slice(start, start + MEM_PAGE_SIZE);

  var grouped = {};
  var dates = [];
  pageItems.forEach(function (eventItem) {
    var date = (eventItem.time || "").substring(0, 10) || "未知日期";
    if (!grouped[date]) {
      grouped[date] = [];
      dates.push(date);
    }
    grouped[date].push(eventItem);
  });
  dates.sort().reverse();

  var html = "";
  dates.forEach(function (date) {
    var label = _memoryDateLabel(date);
    html += '<div class="mem-date-group">';
    html +=
      '<div class="mem-date-label" style="font-size:12px;color:' +
      labelColor +
      ";margin:18px 0 8px 0;font-weight:700;letter-spacing:0.3px;\">" +
      escapeHtml(label) +
      "</div>";

    grouped[date].forEach(function (eventItem) {
      var view = memoryEventCopy(eventItem);
      var layer = eventItem.layer || "MEM";
      var tagCls = "mem-tag mem-tag-" + (/^L[1-8]$/.test(layer) ? layer : "default");
      var time = eventItem.time ? String(eventItem.time).replace("T", " ").substring(11, 16) : "";

      html +=
        '<div class="mem-item" data-layer="' +
        escapeHtml(layer) +
        '" style="padding:16px 18px;background:' +
        cardBg +
        ";border:1px solid " +
        borderColor +
        ';border-radius:16px;margin-bottom:10px;box-shadow:var(--shadow-card);position:relative;overflow:hidden;">';
      html += '<div style="position:absolute;top:0;left:0;right:0;height:1px;background:var(--glow-line);"></div>';
      html +=
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;"><div style="display:flex;align-items:center;gap:8px;min-width:0;"><span class="' +
        tagCls +
        '">' +
        escapeHtml(layer) +
        '</span><span style="font-size:14px;font-weight:700;color:' +
        textColor +
        ';letter-spacing:0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
        escapeHtml(view.title) +
        '</span></div><span style="font-size:11px;color:' +
        labelColor +
        ';flex-shrink:0;">' +
        escapeHtml(time) +
        "</span></div>";
      html += '<div style="font-size:13px;color:' + textColor + ';line-height:1.82;opacity:0.96;">' + view.content + "</div>";
      html += "</div>";
    });

    html += "</div>";
  });

  if (!html) {
    html = '<div style="color:' + labelColor + ';">没有匹配的记忆事件</div>';
  }

  var btnBase =
    "padding:7px 14px;border-radius:10px;border:1px solid var(--border-chip);background:var(--bg-chip);color:var(--text-primary);font-size:13px;cursor:pointer;";
  var btnDisabled =
    "padding:7px 14px;border-radius:10px;border:1px solid var(--border-card);background:transparent;color:var(--text-label);font-size:13px;cursor:default;opacity:0.5;";

  html += '<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px;padding-bottom:8px;">';
  html +=
    '<button style="' +
    (_memCurrentPage <= 1 ? btnDisabled : btnBase) +
    '" onclick="memGoPage(' +
    (_memCurrentPage - 1) +
    ')" ' +
    (_memCurrentPage <= 1 ? "disabled" : "") +
    ">← 上一页</button>";
  html +=
    '<span style="font-size:13px;color:' +
    labelColor +
    ';">第 ' +
    _memCurrentPage +
    " 页 / 共 " +
    totalPages +
    " 页（" +
    total +
    " 条）</span>";
  html +=
    '<button style="' +
    (_memCurrentPage >= totalPages ? btnDisabled : btnBase) +
    '" onclick="memGoPage(' +
    (_memCurrentPage + 1) +
    ')" ' +
    (_memCurrentPage >= totalPages ? "disabled" : "") +
    ">下一页 →</button>";
  html += "</div>";

  var timeline = document.getElementById("memoryTimeline");
  if (timeline) {
    timeline.innerHTML = html;
  }

  var scrollContainer = document.getElementById("memScroll");
  if (scrollContainer) {
    scrollContainer.scrollTop = 0;
  }
}

function _memoryDateLabel(date) {
  var now = new Date();
  var today =
    now.getFullYear() +
    "-" +
    String(now.getMonth() + 1).padStart(2, "0") +
    "-" +
    String(now.getDate()).padStart(2, "0");
  var yesterdayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  var yesterday =
    yesterdayDate.getFullYear() +
    "-" +
    String(yesterdayDate.getMonth() + 1).padStart(2, "0") +
    "-" +
    String(yesterdayDate.getDate()).padStart(2, "0");

  if (date === today) return "今天";
  if (date === yesterday) return "昨天";
  return date;
}

function memGoPage(page) {
  _memCurrentPage = page;
  _memRenderPage();
}

function filterMemBySearch(query) {
  query = (query || "").toLowerCase();
  var allEvents = window._memAllEvents || [];
  _memFilteredItems = allEvents.filter(function (eventItem) {
    var metaText = "";
    try {
      metaText = JSON.stringify(eventItem.meta || {});
    } catch (err) {
      metaText = "";
    }
    var text = ((eventItem.content || "") + (eventItem.title || "") + metaText).toLowerCase();
    var matchesText = !query || text.includes(query);
    var matchesLayer = currentMemoryFilter === "all" || eventItem.layer === currentMemoryFilter;
    return matchesText && matchesLayer;
  });
  _memCurrentPage = 1;
  _memRenderPage();
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function safeText(text) {
  return escapeHtml(String(text || "").replace(/\u0000/g, "").trim());
}

function safeMultiline(text) {
  return safeText(text).replace(/\r?\n+/g, "<br>");
}

function emphasizeQuoted(text) {
  return String(text || "").replace(
    /「([^」]+)」/g,
    '<strong style="font-weight:700;letter-spacing:0.2px;">「$1」</strong>'
  );
}

function detectSkillName(text) {
  text = String(text || "");
  var boxed = text.match(/【([^】]+)】/);
  if (boxed) return boxed[1];

  var square = text.match(/\[([^\]]+)\]/);
  if (square) return square[1];

  var quoted = text.match(/「([^」]+)」/);
  if (quoted) return quoted[1];

  var slashLead = text.match(/^\s*([a-zA-Z_][a-zA-Z0-9_-]*)\s*\//);
  if (slashLead) return slashLead[1];

  var known = text.match(/\b(story|weather|draw|run_code|llm_chat|web_search|open_target)\b/i);
  return known ? known[1] : "";
}

function isDirtyText(text) {
  text = String(text || "");
  return /\?\?\?|�|锟斤拷|\u0000|\u0001|\u0002/.test(text);
}

function layerLabel(layer) {
  if (layer === "L1") return "记忆粒子";
  if (layer === "L2") return "记忆凝结";
  if (layer === "L3") return "记忆结晶";
  if (layer === "L4") return "人格图谱";
  if (layer === "L5") return "方法经验";
  if (layer === "L6") return "执行轨迹";
  if (layer === "L7") return "反馈学习";
  if (layer === "L8") return "已学知识";
  return "系统事件";
}

function memoryEventCopy(eventItem) {
  var layer = eventItem.layer || "Lx";
  var meta = normalizeMemoryMeta(eventItem);
  var rawContent = eventItem.content || "";
  var rawTitle = eventItem.title || "";
  var type = eventItem.event_type || "";

  return {
    title: memoryEventTitle(layer, meta, rawTitle),
    content: emphasizeQuoted(memoryEventContent(layer, meta, rawContent, type)),
  };
}

function normalizeMemoryMeta(eventItem) {
  var meta = eventItem.meta || {};
  if (meta.kind) return meta;
  return inferLegacyMemoryMeta(eventItem.layer || "", eventItem.title || "", eventItem.content || "", eventItem.event_type || "");
}

function isGenericL8Title(title) {
  title = String(title || "").trim();
  return (
    !title ||
    title === "能力进化" ||
    title === "成长经验" ||
    title === "已学知识" ||
    title === "自主学习" ||
    title === "对话结晶"
  );
}

function extractLegacyL8Query(rawTitle, rawContent) {
  var title = String(rawTitle || "").trim();
  var content = String(rawContent || "").trim();
  var patterns = [
    /学到[「“"]([^」”"\n]+)[」”"]/,
    /习得经验[:：]\s*[「“"]([^」”"\n]+)[」”"]/,
    /学习了[「“"]([^」”"\n]+)[」”"]/,
    /主题[:：]\s*([^\n：:]+)/,
  ];
  var i = 0;
  var match = null;

  if (!isGenericL8Title(title)) return title;

  for (i = 0; i < patterns.length; i += 1) {
    match = content.match(patterns[i]);
    if (match && match[1]) return String(match[1]).trim();
  }

  match = content.match(/^([^：:\n]{2,60})[:：]/);
  if (match && match[1]) return String(match[1]).trim();

  match = content.match(/^([^\n]{2,60})$/);
  if (match && match[1]) return String(match[1]).trim();

  return "";
}

function extractLegacyL8Summary(rawContent, query) {
  var summary = String(rawContent || "").trim();
  var escapedQuery = String(query || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

  if (!summary) return "";

  summary = summary
    .replace(/^学到[「“"][^」”"]+[」”][：:，,\s]*/, "")
    .replace(/^习得经验[：:]\s*[「“"][^」”"]+[」”][：:，,\s]*/, "")
    .replace(/^学习了[「“"][^」”"]+[」”][：:，,\s]*/, "")
    .replace(/^主题[：:]\s*[^：:\n]+[：:，,\s]*/, "")
    .trim();

  if (escapedQuery) {
    summary = summary
      .replace(new RegExp("^" + escapedQuery + "[：:，,\\s]*"), "")
      .trim();
  }

  return summary;
}

function inferLegacyMemoryMeta(layer, rawTitle, rawContent, type) {
  var title = String(rawTitle || "");
  var content = String(rawContent || "");
  var skill = detectSkillName(content);

  if (layer === "L5") {
    var successCount = parseMemoryCount(content, /已沉淀\s*(\d+)\s*次/);
    var visibleCount = parseMemoryCount(content, /已掌握\s*(\d+)\s*项技能/);
    var isLegacyMethod = title.indexOf("成功经验") !== -1 || successCount > 0;
    var isLegacyAbility =
      title.indexOf("技能矩阵") !== -1 ||
      type === "skill" ||
      content.indexOf("解锁新技能") !== -1 ||
      content.indexOf("掌握了新技能") !== -1;

    if (isLegacyMethod) {
      return {
        kind: "method_experience",
        skill: skill,
        summary: content,
        success_count: successCount,
        inferred_from_legacy: true,
      };
    }

    if (isLegacyAbility) {
      return {
        kind: "ability_hint",
        skill: skill,
        visible_count: visibleCount,
        inferred_from_legacy: true,
      };
    }
  }

  if (layer === "L6") {
    var executionCount = parseMemoryCount(content, /累计\s*(\d+)\s*次/);
    var observedMatch = content.match(/observed=([^/]+)/);
    var driftMatch = content.match(/drift=([^/]+)/);
    var summary = extractLegacyExecutionSummary(content, skill);
    var isLegacyExecutionCount =
      title.indexOf("技能执行") !== -1 ||
      content.indexOf("使用了：") !== -1 ||
      content.indexOf("完成了一次技能调用") !== -1;

    if (isLegacyExecutionCount) {
      return {
        kind: "execution_count",
        skill: skill,
        count: executionCount,
        status_note: content,
        inferred_from_legacy: true,
      };
    }

    if (title.indexOf("执行轨迹") !== -1 || type === "evolution") {
      return {
        kind: "execution_trace",
        skill: skill,
        summary: summary,
        verified: /verified|已验证/.test(content),
        observed_state: observedMatch ? String(observedMatch[1] || "").trim() : "",
        drift_reason: driftMatch ? String(driftMatch[1] || "").trim() : "",
        inferred_from_legacy: true,
      };
    }
  }

  if (layer === "L8") {
    var l8Query = extractLegacyL8Query(title, content);
    return {
      kind: "self_learned",
      query: l8Query,
      summary: extractLegacyL8Summary(content, l8Query),
      inferred_from_legacy: true,
    };
  }

  return {};
}

function parseMemoryCount(text, pattern) {
  var match = String(text || "").match(pattern);
  if (!match) return 0;
  return Number(match[1]) || 0;
}

function extractLegacyExecutionSummary(content, skill) {
  var text = String(content || "").trim();
  if (!text) return "";
  if (skill) {
    text = text.replace(skill, "").replace(/^[/\s-]+/, "").trim();
  }
  return text;
}

function memoryEventTitle(layer, meta, rawTitle) {
  if (meta.kind === "l2_impression") return safeText(meta.type_label) || "记忆凝结";
  if (meta.kind === "method_experience") return "方法经验";
  if (meta.kind === "ability_hint") return "能力线索";
  if (meta.kind === "execution_trace" || meta.kind === "execution_count") return "执行轨迹";
  if (meta.kind === "self_learned") return "自主学习";
  if (meta.kind === "dialogue_crystal") return "对话结晶";
  if (meta.kind === "feedback_relearn") return "纠偏补学";
  return rawTitle || layerLabel(layer);
}

function memoryEventContent(layer, meta, rawContent, type) {
  if (meta.kind === "l2_impression") return buildL2ImpressionContent(meta, rawContent);
  if (meta.kind === "method_experience") return buildMethodExperienceContent(meta, rawContent);
  if (meta.kind === "ability_hint") return buildAbilityHintContent(meta, rawContent);
  if (meta.kind === "execution_trace") return buildExecutionTraceContent(meta, rawContent);
  if (meta.kind === "execution_count") return buildExecutionCountContent(meta, rawContent);
  if (meta.kind === "self_learned" || meta.kind === "dialogue_crystal" || meta.kind === "feedback_relearn") {
    return buildL8KnowledgeContent(meta, rawContent);
  }
  return buildGenericMemoryContent(layer, rawContent, type);
}

function buildL2ImpressionContent(meta, rawContent) {
  var memoryType = safeText(meta.memory_type || "general");
  var userText = safeText(meta.user_text || "");
  var aiBrief = safeMultiline(meta.ai_brief || "");
  var hitCount = Number(meta.hit_count) || 0;
  var repeatCount = Number(meta.repeat_count) || 1;
  var crystallized = meta.crystallized === true;
  var retentionLabel = safeText(meta.retention_label || "");
  var retentionReason = safeText(meta.retention_reason || "");
  var lines = [];

  if (memoryType === "fact") lines.push("记住了一个用户事实：" + userText);
  else if (memoryType === "preference") lines.push("捕捉到一个偏好倾向：" + userText);
  else if (memoryType === "rule") lines.push("留住了一条当前约束：" + userText);
  else if (memoryType === "project") lines.push("捕捉到一个项目线索：" + userText);
  else if (memoryType === "goal") lines.push("识别到一个目标方向：" + userText);
  else if (memoryType === "decision") lines.push("留住了一次选择倾向：" + userText);
  else if (memoryType === "knowledge") lines.push("留下了一个知识问题：" + userText);
  else if (memoryType === "correction") lines.push("记下了一次纠正反馈：" + userText);
  else if (memoryType === "skill_demand") lines.push("保留了一条需求线索：" + userText);
  else if (userText && repeatCount > 1) lines.push("近期反复出现的对话印象：" + userText);

function memoryGrowthProfile(counts) {
  counts = counts || {};
  var l1 = Math.min(Number(counts.L1) || 0, 500);
  var l2 = Math.min(Number(counts.L2) || 0, 600);
  var l3 = Number(counts.L3) || 0;
  var l4 = Number(counts.L4) || 0;
  var l5 = Number(counts.L5) || 0;
  var l6 = Number(counts.L6) || 0;
  var l7 = Number(counts.L7) || 0;
  var l8 = Number(counts.L8) || 0;
  var totalExp = l1 * 1 + l2 * 5 + l3 * 12 + l4 * 20 + l5 * 8 + l6 * 3 + l7 * 15 + l8 * 10;
  var level = 1;
  var spent = 0;
  var nextNeed = 100;

  while (totalExp >= spent + nextNeed) {
    spent += nextNeed;
    level += 1;
    nextNeed = 100 + (level - 1) * 20;
  }

  var currentExp = Math.max(0, totalExp - spent);
  var remainingExp = Math.max(0, nextNeed - currentExp);
  var progressPercent = nextNeed > 0 ? Math.max(0, Math.min(100, Math.round((currentExp / nextNeed) * 100))) : 100;

  return {
    totalExp: totalExp,
    level: level,
    currentExp: currentExp,
    nextNeed: nextNeed,
    remainingExp: remainingExp,
    progressPercent: progressPercent,
  };
}

  return (Number(n) || 0).toLocaleString("zh-CN");
}

}

function runSelfRepairAction(action, reportId){
 var isLight=document.body.classList.contains('light');
 var targetId=String(reportId||'').trim();
 if(action!=='refresh'&&!targetId) return;
 settingsPanelState.error='';
 settingsPanelState.notice=(action==='preview'?'正在生成改动预览...':(action==='apply'?'正在应用修复提案...':'正在刷新修复提案...'));
 settingsPanelState.repairActionBusy=action+':'+targetId;
 if(targetId) settingsPanelState.activeRepairId=targetId;
 renderSettingsPage(isLight);
 if(action==='refresh'){
  settingsPanelState.repairActionBusy='';
  refreshSettingsData(isLight,'修复提案列表已刷新').catch(function(){
   settingsPanelState.error='修复提案刷新失败，请稍后再试';
   renderSettingsPage(isLight);
  });
  return;
 }
 var endpoint=action==='apply'?'/self_repair/apply':'/self_repair/preview';
 var payload=action==='apply'?{report_id:targetId}:{report_id:targetId,auto_apply:false,run_validation:true};
 fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json; charset=utf-8','Accept':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(data){
  if(!data||data.ok===false) throw new Error((data&&data.error)||'unknown_error');
  var report=(data&&data.report)||{};
  var applyStatus=String(((report.apply_result||{}).status)||'').trim();
  var previewStatus=String((((report.patch_preview||{}).status)||'')).trim();
  var notice='修复提案状态已更新';
  if(action==='preview') notice=previewStatus==='preview_ready'?'改动预览已经准备好了':'改动预览生成失败，请看卡片详情';
  else if(applyStatus==='applied'||applyStatus==='applied_without_validation') notice='修复提案已经应用';
  else if(applyStatus.indexOf('rolled_back')===0) notice='修复执行后未通过验证，已经自动回滚';
  else if(applyStatus==='already_applied') notice='这条修复提案已经应用过了';
  else if(applyStatus) notice='修复提案已处理，请看卡片里的最新状态';
  settingsPanelState.repairActionBusy='';
  return refreshSettingsData(isLight,notice);
 }).catch(function(){
  settingsPanelState.repairActionBusy='';
  settingsPanelState.error=(action==='apply'?'修复提案应用失败，请稍后再试':'修复提案预览失败，请稍后再试');
  renderSettingsPage(isLight);
 });
}

function handleSettingsAction(action, detail){
 detail=detail||{};
 if(action==='toggle'){ if(detail.key) toggleAutolearnSetting(detail.key); return; }
 if(action==='preset'){ if(detail.key) applyAutolearnPreset(detail.key); return; }
 if(action==='advanced-toggle'){ toggleAutolearnAdvanced(); return; }
 if(action==='advanced-save'){ saveAutolearnAdvancedSettings(); return; }
 if(action==='self-repair-refresh'){ runSelfRepairAction('refresh',''); return; }
 if(action==='self-repair-toggle'){ toggleSelfRepairReportDetails(detail.key); return; }
 if(action==='self-repair-preview'){ runSelfRepairAction('preview',detail.key); return; }
 if(action==='self-repair-apply'){ runSelfRepairAction('apply',detail.key); }
}

function refreshSettingsData(isLight, noticeText){
 return Promise.all([
  fetch('/stats').then(function(r){return r.json();}),
  fetch('/autolearn/config').then(function(r){return r.json();}),
  fetch('/self_repair/status').then(function(r){return r.json();}),
  fetch('/self_repair/reports?limit=6').then(function(r){return r.json();}).catch(function(){return {reports:[]};}),
  fetch('/l7/stats').then(function(r){return r.json();}).catch(function(){return {};})
 ]).then(function(values){
  var statsResp=values[0]||{};
  var configResp=values[1]||{};
  var statusResp=values[2]||{};
  var reportsResp=values[3]||{};
  var l7Resp=values[4]||{};
  settingsPanelState.stats=statsResp.stats||statsResp||{};
  settingsPanelState.config=mergeAutolearnConfig((configResp&&configResp.config)||settingsPanelState.config||{});
  settingsPanelState.selfRepairStatus=(statusResp&&statusResp.status)||settingsPanelState.selfRepairStatus||{};
  settingsPanelState.selfRepairReports=Array.isArray(reportsResp&&reportsResp.reports)?reportsResp.reports:[];
  settingsPanelState.l7Stats=l7Resp;
  if(settingsPanelState.activeRepairId){
   var stillExists=settingsPanelState.selfRepairReports.some(function(item){return String((item||{}).id||'')===String(settingsPanelState.activeRepairId||'');});
   if(!stillExists) settingsPanelState.activeRepairId=(settingsPanelState.selfRepairReports[0]&&settingsPanelState.selfRepairReports[0].id)||'';
  }else{
   settingsPanelState.activeRepairId=(settingsPanelState.selfRepairReports[0]&&settingsPanelState.selfRepairReports[0].id)||'';
  }
  if(noticeText!==undefined){settingsPanelState.notice=noticeText;settingsPanelState.error='';}
  renderSettingsPage(isLight);
 });
}

function saveAutolearnConfigPatch(patch, noticeText){
 var isLight=document.body.classList.contains('light');
 settingsPanelState.error='';
 settingsPanelState.notice='正在保存...';
 renderSettingsPage(isLight);
 fetch('/autolearn/config',{
  method:'POST',
  headers:{'Content-Type':'application/json; charset=utf-8','Accept':'application/json'},
  body:JSON.stringify(patch||{})
 }).then(function(r){return r.json();}).then(function(data){
  settingsPanelState.config=mergeAutolearnConfig((data&&data.config)||settingsPanelState.config||{});
  return refreshSettingsData(isLight,noticeText||'已保存');
 }).catch(function(){
  settingsPanelState.error='保存失败，请稍后再试';
  renderSettingsPage(isLight);
 });
}

function toggleAutolearnSetting(key){
 if(!settingsPanelState.config) settingsPanelState.config={};
 var next=!mergeAutolearnConfig(settingsPanelState.config)[key];
 settingsPanelState.config[key]=next;
 console.log('[settings] toggle', key, '->', next, 'config.enabled=', settingsPanelState.config.enabled);
 var isLight=document.body.classList.contains('light');
 settingsPanelState.notice='';
 settingsPanelState.error='';
 renderSettingsPage(isLight);
 var patch={};patch[key]=next;
 fetch('/autolearn/config',{
  method:'POST',
  headers:{'Content-Type':'application/json; charset=utf-8','Accept':'application/json'},
  body:JSON.stringify(patch)
 }).then(function(r){return r.json();}).then(function(data){
  settingsPanelState.config=mergeAutolearnConfig((data&&data.config)||settingsPanelState.config||{});
  return refreshSettingsData(isLight,next?'已开启':'已关闭');
 }).catch(function(){
  settingsPanelState.error='保存失败';
  renderSettingsPage(isLight);
 });
}

function applyAutolearnPreset(key){
 var presets=autolearnPresets();
 if(!presets[key]) return;
 var patch={};
 Object.keys(presets[key].patch).forEach(function(field){patch[field]=presets[key].patch[field];});
 saveAutolearnConfigPatch(patch,'已切换到「'+presets[key].label+'」');
}

function _classifyModelToProvider(mid, cfg, catalog){
 if(!catalog) return null;
 var midL=mid.toLowerCase();
 var modelName=String((cfg||{}).model||'').toLowerCase();
 var baseUrl=String((cfg||{}).base_url||'').toLowerCase();
 // 第一轮：按模型 ID / 模型名 / 别名匹配（优先级高）
 for(var pkey in catalog){
  if(midL.indexOf(pkey)!==-1||modelName.indexOf(pkey)!==-1) return pkey;
  var aliases=catalog[pkey].aliases||[];
  for(var i=0;i<aliases.length;i++){
   if(midL.indexOf(aliases[i])!==-1||modelName.indexOf(aliases[i])!==-1) return pkey;
  }
 }
 // 第二轮：按 base_url 匹配（兜底）
 for(var pkey2 in catalog){
  if(catalog[pkey2].url_hint && baseUrl.indexOf(catalog[pkey2].url_hint)!==-1) return pkey2;
 }
 return null;
}

function _toggleProviderGroup(pkey){
 _settingsExpandedProviders[pkey]=!_settingsExpandedProviders[pkey];
 renderSettingsPage(document.body.classList.contains('light'));
}

function _quickAddModel(pkey, modelId){
 if(!_settingsModels||!_settingsCatalog) return;
 var catalog=_settingsCatalog;
 var pinfo=catalog[pkey];
 if(!pinfo) return;
 // 找同厂商已有配置作为 donor
 var donorCfg=null;
 for(var mid in _settingsModels){
  var classified=_classifyModelToProvider(mid, _settingsModels[mid], catalog);
  if(classified===pkey){ donorCfg=_settingsModels[mid]; break; }
 }
 if(!donorCfg||!donorCfg.api_key||!donorCfg.base_url){
  alert('\u8be5\u5382\u5546\u6ca1\u6709\u5df2\u914d\u7f6e\u7684\u6a21\u578b\uff0c\u8bf7\u5148\u624b\u52a8\u6dfb\u52a0\u4e00\u4e2a');
  return;
 }
 var cfg={
  api_key:donorCfg.api_key,
  base_url:donorCfg.base_url,
  model:modelId,
  vision:donorCfg.vision||false
 };
 fetch('/models/config',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({id:modelId,config:cfg})
 }).then(function(r){return r.json();}).then(function(d){
  if(d.ok) loadSettingsModels();
  else alert(d.error||'\u6dfb\u52a0\u5931\u8d25');
 }).catch(function(){alert('\u6dfb\u52a0\u5931\u8d25');});
}

function renderModelManageSection(isLight,textColor,subColor,cardBg,borderColor){

 html+='</div>';
 html+='<div id="modelListBox" style="display:flex;flex-direction:column;gap:8px;">';

   html+='</div>';
   // 展开内容
   if(isExpanded){

     if(isCurrent){

     html+='<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:'+uRowBg+';border:1px solid '+uRowBorder+';border-radius:10px;">';

     html+='</div>';
    }
    html+='</div>';
   }
   html+='</div>';
  }
 }
 html+='</div></div>';
 return html;
}

function loadSettingsModels(){
 Promise.all([
  fetch('/models/config').then(function(r){return r.json();}),
  fetch('/models/catalog').then(function(r){return r.json();}).catch(function(){return {catalog:{}};})
 ]).then(function(values){
  var d=values[0]||{};
  var c=values[1]||{};
  _settingsModels=d.models||{};
  _settingsCurrentModel=d.current||'';
  _settingsCatalog=c.catalog||{};
  // 同步侧边栏
  window._novaModels={};
  Object.keys(_settingsModels).forEach(function(k){
   window._novaModels[k]={model:(_settingsModels[k]||{}).model||k,vision:!!(_settingsModels[k]||{}).vision,base_url:(_settingsModels[k]||{}).base_url||''};
  });
  window._novaCurrentModel=_settingsCurrentModel;
  window._novaCatalog=_settingsCatalog;
  var el=document.getElementById('modelName');
  var _curCfg=_settingsModels[_settingsCurrentModel];
  if(el) el.textContent=(_curCfg&&_curCfg.model)?_curCfg.model:(_settingsCurrentModel||t('unknown'));
  if(typeof updateImageBtnState==='function') updateImageBtnState();
  renderSettingsPage(document.body.classList.contains('light'));
 }).catch(function(){});
}

function _modelDialogSave(editId){
 var isEdit=!!editId;
 var mid=isEdit?editId:(document.getElementById('mdlId').value||'').trim();
 if(!mid){document.getElementById('mdlId').style.borderColor='#ef4444';return;}
 var modelName=(document.getElementById('mdlName').value||'').trim()||mid;
 var baseUrl=(document.getElementById('mdlUrl').value||'').trim();
 if(!baseUrl){document.getElementById('mdlUrl').style.borderColor='#ef4444';return;}
 var apiKey=(document.getElementById('mdlKey').value||'').trim();
 if(!isEdit&&!apiKey){document.getElementById('mdlKey').style.borderColor='#ef4444';return;}
 var vision=document.getElementById('mdlVision').checked;
 var cfg={base_url:baseUrl,model:modelName,vision:vision};
 if(apiKey) cfg.api_key=apiKey;
 else if(isEdit&&_settingsModels[editId]) cfg.api_key=_settingsModels[editId].api_key;
 saveModelConfig(mid,cfg);
 var dlg=document.getElementById('modelDialog');
 if(dlg)dlg.remove();
}

function _modelDialogDelete(mid){
 if(!confirm(t('settings.models.delete.confirm')+' '+mid+' ?'))return;
 fetch('/models/config',{
  method:'DELETE',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({id:mid})
 }).then(function(r){return r.json();}).then(function(d){
  if(d.ok){var dlg=document.getElementById('modelDialog');if(dlg)dlg.remove();loadSettingsModels();}
  else alert(d.error||t('settings.models.delete.fail'));
 }).catch(function(){alert(t('settings.models.delete.fail'));});
}

function saveModelConfig(mid,cfg){
 fetch('/models/config',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({id:mid,config:cfg})
 }).then(function(r){return r.json();}).then(function(d){
  if(d.ok) loadSettingsModels();
  else alert(d.error||'\u4fdd\u5b58\u5931\u8d25');
 }).catch(function(){alert('\u4fdd\u5b58\u5931\u8d25');});
}


function switchModel(mid){
 if(mid===_settingsCurrentModel) return;
 // 即时视觉反馈：禁用所有启用按钮
 var btns=document.querySelectorAll('[onclick*="switchModel"]');
 btns.forEach(function(el){el.style.pointerEvents='none';el.style.opacity='0.5';});
 var clicked=null;
 btns.forEach(function(el){if(el.getAttribute('onclick').indexOf(mid)!==-1){clicked=el;}});
 if(clicked){clicked.style.opacity='1';clicked.textContent=t('settings.models.switching');}
 fetch('/model/'+encodeURIComponent(mid),{method:'POST'})
  .then(function(r){return r.json();})
  .then(function(d){
   if(d.ok||d.model){
    _settingsCurrentModel=mid;
    window._novaCurrentModel=mid;
    var el=document.getElementById('modelName');
    var _sw=(_settingsModels[mid]||{}).model||mid;
    if(el) el.textContent=_sw;
    if(typeof updateImageBtnState==='function') updateImageBtnState();
    // 延迟刷新，让用户先看到切换成功
    setTimeout(function(){loadSettingsModels();},300);
   }else{
    alert(d.error||'\u5207\u6362\u5931\u8d25');
    loadSettingsModels();
   }
  }).catch(function(){
   alert('\u5207\u6362\u5931\u8d25');
   loadSettingsModels();
  });
}

</script>

<script>// === 统计页驾驶舱 ===
function fmtN(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e4)return(n/1e3).toFixed(1)+'K';return n.toLocaleString();}

var PRICE={'deepseek':{i:1,o:2},'minimax':{i:1,o:8},'qwen':{i:2,o:6},'glm':{i:1,o:1}};
function getPrice(model){var m=(model||'').toLowerCase();for(var k in PRICE){if(m.indexOf(k)!==-1)return PRICE[k];}return{i:2,o:4};}

// 顶部4个摘要卡
function buildSummaryCards(s,costYuan,cacheRate,compositeRate,topScene){
  var h='<div class="stats-summary">';
  // 1.成本概览
  var costHint=costYuan<1?t('dash.cost.low'):t('dash.cost.ok');
  var costCls='';
  if(costYuan>10){costHint=t('dash.cost.high');costCls=' warn';}
  h+='<div class="stats-summary-card"><div class="stats-summary-label">'+t('dash.cost')+'</div>';
  h+='<div class="stats-summary-value">\u00a5'+costYuan.toFixed(2)+'</div>';
  h+='<div class="stats-summary-hint'+costCls+'">'+costHint+'</div></div>';
  // 2.Tokens 吞吐
  var totalTk=s.total_tokens||0;
  var inpTk=s.input_tokens||0;
  var inPct=totalTk>0?Math.round(inpTk/totalTk*100):0;
  h+='<div class="stats-summary-card"><div class="stats-summary-label">'+t('dash.tokens')+'</div>';
  h+='<div class="stats-summary-value">'+fmtN(totalTk)+'</div>';
  h+='<div class="stats-summary-hint">'+t('dash.input.pct')+' '+inPct+'%</div></div>';
  // 3.记忆深度
  var memHint=compositeRate>=50?t('dash.mem.good'):t('dash.mem.growing');
  var memCls=compositeRate<30?' warn':'';
  h+='<div class="stats-summary-card"><div class="stats-summary-label">'+t('dash.mem.eff')+'</div>';
  h+='<div class="stats-summary-value">'+compositeRate+'%</div>';
  h+='<div class="stats-summary-hint'+memCls+'">'+memHint+'</div></div>';
  // 4.平均单次
  var totalReq=s.total_requests||0;
  var avgCost=totalReq>0?(costYuan/totalReq):0;
  var avgHint=totalReq>0?tf('dash.total.conv',totalReq):t('dash.no.conv');
  h+='<div class="stats-summary-card"><div class="stats-summary-label">'+t('dash.avg')+'</div>';
  h+='<div class="stats-summary-value">\u00a5'+avgCost.toFixed(4)+'</div>';
  h+='<div class="stats-summary-hint">'+avgHint+'</div></div>';
  h+='</div>';
  return h;
}

// 运行成本模块（三段式费用 + 平均维度）
function buildCostModule(s,pr,costYuan){
  var inp=s.input_tokens||0, out=s.output_tokens||0, total=s.total_tokens||0;
  var totalReq=s.total_requests||0;
  var cw=s.cache_write_tokens||0, cr=s.cache_read_tokens||0;
  var costNew=cw*pr.i/1e6, costCache=cr*pr.i*0.1/1e6, costOut=out*pr.o/1e6;
  var saved=cr*pr.i*0.9/1e6;
  var avgCost=totalReq>0?(costYuan/totalReq):0;
  var h='<div class="stats-section"><div class="stats-section-title">'+t('dash.cost.title')+'</div>';
  h+='<div class="stats-module"><div class="stats-cost-grid">';
  // 左主区：三段式费用
  h+='<div class="stats-cost-main">';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.input')+'</span><span style="font-weight:600;">¥'+costNew.toFixed(3)+'</span></div>';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.cache')+'</span><span style="font-weight:600;color:#6a9fd8;">¥'+costCache.toFixed(4)+'</span></div>';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.output')+'</span><span style="font-weight:600;">¥'+costOut.toFixed(4)+'</span></div>';
  h+='<div class="stats-kv-mini" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.04);"><span class="stats-kv-label">'+t('dash.cost.total')+'</span><span style="font-weight:700;color:#6aaa88;">¥'+costYuan.toFixed(2)+'</span></div>';
  if(saved>0){h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.saved')+'</span><span style="font-weight:600;color:#6aaa88;">¥'+saved.toFixed(4)+'</span></div>';}
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.avg')+'</span><span style="font-weight:600;">¥'+avgCost.toFixed(4)+'</span></div>';
  h+='</div>';
  // 右辅区：平均维度
  var avgInp=totalReq>0?Math.round(inp/totalReq):0;
  var avgOut=totalReq>0?Math.round(out/totalReq):0;
  var inPct=total>0?Math.round(inp/total*100):0;
  h+='<div class="stats-cost-sub">';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.requests')+'</span><span>'+totalReq.toLocaleString()+t('dash.cost.times')+'</span></div>';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.totalTokens')+'</span><span>'+fmtN(total)+' tokens</span></div>';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.inputTokens')+'</span><span>'+fmtN(cw)+' tokens</span></div>';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.cacheTokens')+'</span><span>'+fmtN(cr)+' tokens</span></div>';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.outputTokens')+'</span><span>'+fmtN(out)+' tokens</span></div>';
  h+='<div class="stats-kv-mini" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.04);"><span class="stats-kv-label">'+t('dash.cost.avgInput')+'</span><span>'+fmtN(avgInp)+' tokens</span></div>';
  h+='<div class="stats-kv-mini"><span class="stats-kv-label">'+t('dash.cost.avgOutput')+'</span><span>'+avgOut+' tokens</span></div>';
  h+='</div></div>';
  h+='</div></div>';
  return h;
}

// 主渲染入口
function renderStats(s){
  var bs=s.by_scene||{};
  var _pr=s.prices||getPrice(s.model);
  var pr={i:_pr.i||_pr.input||2,o:_pr.o||_pr.output||4};
  var cHit=s.cache_read_tokens||0;var cMiss=(s.input_tokens||0)-cHit;var costYuan=(Math.max(0,cMiss)*pr.i+cHit*pr.i*0.1+(s.output_tokens||0)*pr.o)/1e6;
  var cacheRead=s.cache_read_tokens||0;
  var cacheRate=(s.input_tokens||0)>0?Math.round(cacheRead/(s.input_tokens||1)*100):0;
  var mem=s.memory||{};
  var l2s=mem.l2_searches||0,l2h=mem.l2_hits||0;
  var l8s=mem.l8_searches||0,l8h=mem.l8_hits||0;
  var tq=mem.total_queries||0,fla=mem.full_layer_available||0;
  var fullPct=tq>0?Math.round(fla/(tq*4)*100):0;
  var searchHits=l2h+l8h,searchTotal=l2s+l8s;
  var searchPct=searchTotal>0?Math.round(searchHits/searchTotal*100):0;
  var compositeRate=tq>0?Math.min(100,Math.round((fullPct+searchPct)/2)):0;
  var scenes=[{k:'chat',n:t('dash.scene.chat')},{k:'route',n:t('dash.scene.route')},{k:'skill',n:t('dash.scene.skill')},{k:'learn',n:t('dash.scene.learn')}];
  var topScene=t('dash.scene.chat'),topVal=0;
  scenes.forEach(function(sc){var t=(bs[sc.k]||{}).tokens||0;if(t>topVal){topVal=t;topScene=sc.n;}});

  var h='';
  h+=buildSummaryCards(s,costYuan,cacheRate,compositeRate,topScene);
  h+=buildCostModule(s,pr,costYuan);
  h+=buildModelModule(s);
  h+=buildMemoryModule(s);
  h+=buildSceneModule(s);
  h+=buildTrendModule(s);
  h+=buildDiagModule(s);
  h+='<div class="stats-footer"><div class="stats-footer-info">'+t('dash.lastUsed')+'：'+(s.last_used||'-')+'</div></div>';
  return h;
}

// 模型消耗分布
function buildModelModule(s){
  var bm=s.by_model||{};var ap=s.all_prices||{};
  var keys=Object.keys(bm);
  if(keys.length===0) return '';
  var h='<div class="stats-section"><div class="stats-section-title">'+t('dash.model.title','模型消耗分布')+'</div>';
  h+='<div class="stats-module">';
  var totalT=0;keys.forEach(function(k){totalT+=(bm[k].input||0)+(bm[k].output||0);});
  keys.sort(function(a,b){return((bm[b].input||0)+(bm[b].output||0))-((bm[a].input||0)+(bm[a].output||0));});
  var colors=['#6aaa88','#6a9fd8','#c4a35a','#b07cc6','#d4726a'];
  keys.forEach(function(k,idx){
    var m=bm[k],inp=m.input||0,out=m.output||0,req=m.requests||0,tk=inp+out;
    var pct=totalT>0?Math.round(tk/totalT*100):0;
    var mp=null;for(var pk in ap){if(k.indexOf(pk)!==-1){mp=ap[pk];break;}}
    if(!mp)mp={input:2,output:4};
    var cost=(inp*mp.input+out*mp.output)/1e6;
    var clr=colors[idx%colors.length];
    h+='<div class="stats-model-row">';
    h+='<div class="stats-model-name">';
    h+='<span style="width:8px;height:8px;border-radius:50%;background:'+clr+';flex-shrink:0;display:inline-block;"></span>';
    h+='<span>'+k+'</span></div>';
    h+='<div class="stats-model-track"><div style="width:'+Math.max(pct,3)+'%;height:100%;border-radius:3px;background:'+clr+';"></div></div>';
    h+='<div class="stats-model-data">'+pct+'% · ¥'+cost.toFixed(2)+' · '+req+t('dash.cost.times')+'</div>';
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

// 记忆引擎模块
function buildMemoryModule(s){
  var mem=s.memory||{};
  var l2s=mem.l2_searches||0,l2h=mem.l2_hits||0;
  var l8s=mem.l8_searches||0,l8h=mem.l8_hits||0;
  var tq=mem.total_queries||0;
  var l2rate=l2s>0?Math.round(l2h/l2s*100):0;
  var l8rate=l8s>0?Math.round(l8h/l8s*100):0;
  var l1pct=Math.min(100,Math.round((mem.l1_count||0)/30*100));
  var l3q=mem.l3_queries||0, l3h_=mem.l3_hits||0;
  var l4q=mem.l4_queries||0, l4h_=mem.l4_hits||0;
  var l5q=mem.l5_queries||0, l5h_=mem.l5_hits||0;
  var l3rate=l3q>0?Math.round(l3h_/l3q*100):0;
  var l4rate=l4q>0?Math.round(l4h_/l4q*100):0;
  var l5rate=l5q>0?Math.round(l5h_/l5q*100):0;
  var l6rate=tq>0?Math.round((mem.l6_hits||0)/tq*100):0;
  var l7rate=tq>0?Math.round((mem.l7_hits||0)/tq*100):0;
  var l4Mode=String(mem.real_l4_active_mode||'default');
  var l4RuleCount=mem.real_l4_rule_count||0;
  var l4ProfileCount=mem.real_l4_profile_count||0;
  var l4ToneCount=mem.real_l4_tone_count||0;
  var l4ParticleCount=mem.real_l4_particle_count||0;
  var l4AvoidCount=mem.real_l4_avoid_count||0;
  var l4StylePrompt=mem.real_l4_style_prompt||0;
  var l4RecentUpdates=mem.real_l4_recent_updates||0;
  var l4StyleSignal=Math.min(100,
    l4ToneCount*10+
    l4ParticleCount*6+
    l4AvoidCount*4+
    (l4StylePrompt?12:0)+
    Math.min(l4RuleCount,8)*4+
    Math.min(l4ProfileCount,10)*3+
    Math.min(l4RecentUpdates,5)*8+
    (mem.l4_available?8:0)
  );

  // ── 三维指标计算 ──────────────────────────────────────────
  var baseTone   = mem.l4_available ? Math.round(l1pct*0.35 + l4StyleSignal*0.65) : l1pct;
  var cogDepth   = Math.round((l2rate+l3rate+l8rate)/3);
  var neuralKin  = Math.round((l5rate+l6rate+l7rate)/3);
  var compositeRate = Math.round((baseTone+cogDepth+neuralKin)/3);

  var h='<div class="stats-section"><div class="stats-section-title">'+t('dash.mem.title')+'</div>';
  h+='<div class="stats-module">';

  // ── 三维指标卡片 ──────────────────────────────────────────
  var baseCls  = baseTone < 90 ? ' warn' : '';
  var depthCls = cogDepth < 15 ? ' amber' : '';
  var kinCls   = neuralKin === 0 ? ' amber' : '';

  // 认知基调：状态名 + 文案
  var baseState, baseTxt;
  if(!mem.l4_available){ baseState='积累中'; baseTxt='L4 还没真正接入当前轮状态'; }
  else if(baseTone>=98){ baseState='完美同步'; baseTxt='基底频率锁定中，核心人格共鸣率'+baseTone+'%'; }
  else if(baseTone>=90){ baseState='轻微相移'; baseTxt='当前模式：'+l4Mode+' · 规则 '+l4RuleCount+' 条 · 最近7天更新 '+l4RecentUpdates+' 次'; }
  else{ baseState='需要对齐'; baseTxt='L4 丰富度还在堆积：当前模式 '+l4Mode+'，语气信号 '+l4StyleSignal+'%'; }

  // 思维厚度：状态名 + 文案
  var depthState, depthTxt;
  if(cogDepth>45){ depthState='深度扩张'; depthTxt='深层记忆链路活跃，思维密度：扩张'; }
  else if(cogDepth>=15){ depthState='记忆共振'; depthTxt='记忆链路共振，多维经历涌现中'; }
  else if(cogDepth>0){ depthState='浅层触发'; depthTxt='记忆深度待积累，维持即时响应'; }
  else{ depthState='尚未探索'; depthTxt='思维留白，深海尚未探索'; }

  // 神经动能：状态名 + 文案
  var kinState, kinTxt;
  if(neuralKin>20){ kinState='高能演化'; kinTxt='方法经验已开始沉淀，L7 纠偏力矩稳定'; }
  else if(neuralKin>=5){ kinState='常规运行'; kinTxt='神经动能低速运行，状态稳定'; }
  else if(neuralKin>0){ kinState='初始化中'; kinTxt='执行轨迹开始累积，等待更多神经脉冲'; }
  else{ kinState='静息状态'; kinTxt='静态闭环，等待动作触发'; }

  // 视觉含义（tooltip）
  var baseTip  = '大脑的「背景辐射」。L1 对话或 L4 人格出现波动时，稳定性随之下降。';
  var depthTip = '系统正在进行「深海打捞」。数值越高，这次回复的知识负担与回溯深度越重。';
  var kinTip   = '系统的「应变储备」。L5/L6 是对外执行，L7 是对内自省与纠偏，三层共同决定面对复杂需求时的响应能力。';

  h+='<div class="stats-brain-dims">';

  // 认知基调
  h+='<div class="stats-brain-dim'+baseCls+'">';
  h+='<div class="stats-brain-dim-header">';
  h+='<span class="stats-brain-dim-name">认知基调</span>';
  h+='<span class="stats-brain-tip-wrap"><span class="stats-brain-tip-icon">?</span><span class="stats-brain-tip-text">'+baseTip+'</span></span>';
  h+='</div>';
  h+='<div class="stats-brain-dim-en">Base Tone</div>';
  h+='<div class="stats-brain-dim-val'+baseCls+'">'+baseTone+'%</div>';
  h+='<div class="stats-brain-dim-label'+baseCls+'">稳定性 · '+baseState+'</div>';
  h+='<div class="stats-brain-dim-status'+baseCls+'">'+baseTxt+'</div>';
  h+='</div>';

  // 思维厚度
  h+='<div class="stats-brain-dim'+depthCls+'">';
  h+='<div class="stats-brain-dim-header">';
  h+='<span class="stats-brain-dim-name">思维厚度</span>';
  h+='<span class="stats-brain-tip-wrap"><span class="stats-brain-tip-icon">?</span><span class="stats-brain-tip-text">'+depthTip+'</span></span>';
  h+='</div>';
  h+='<div class="stats-brain-dim-en">Cognitive Depth</div>';
  h+='<div class="stats-brain-dim-val'+depthCls+'">'+cogDepth+'%</div>';
  h+='<div class="stats-brain-dim-label'+depthCls+'">丰富度 · '+depthState+'</div>';
  h+='<div class="stats-brain-dim-status'+depthCls+'">'+depthTxt+'</div>';
  h+='</div>';

  // 神经动能
  h+='<div class="stats-brain-dim'+kinCls+'">';
  h+='<div class="stats-brain-dim-header">';
  h+='<span class="stats-brain-dim-name">神经动能</span>';
  h+='<span class="stats-brain-tip-wrap"><span class="stats-brain-tip-icon">?</span><span class="stats-brain-tip-text">'+kinTip+'</span></span>';
  h+='</div>';
  h+='<div class="stats-brain-dim-en">Neural Kinetic</div>';
  h+='<div class="stats-brain-dim-val'+kinCls+'">'+neuralKin+'%</div>';
  h+='<div class="stats-brain-dim-label'+kinCls+'">应变能 · '+kinState+'</div>';
  h+='<div class="stats-brain-dim-status'+kinCls+'">'+kinTxt+'</div>';
  h+='</div>';

  h+='</div>'; // stats-brain-dims

  // ── 节点链路图 ──────────────────────────────────────────
  var nodes=[
    {id:'L1',label:t('dash.mem.L1'),pct:l1pct},
    {id:'L2',label:t('dash.mem.L2'),pct:l2rate},
    {id:'L3',label:t('dash.mem.L3'),pct:l3rate},
    {id:'L4',label:t('dash.mem.L4'),pct:l4rate},
    {id:'L5',label:t('dash.mem.L5'),pct:l5rate},
    {id:'L6',label:t('dash.mem.L6')||'执行',pct:l6rate},
    {id:'L7',label:t('dash.mem.L7')||'纠偏',pct:l7rate},
    {id:'L8',label:t('dash.mem.L8'),pct:l8rate}
  ];
  function nodeClass(n){
    if(n.pct>=50) return 'active';
    if(n.pct>0) return 'growing';
    return 'off';
  }
  h+='<div class="stats-mem-chain">';
  nodes.forEach(function(n){
    h+='<div class="stats-mem-node '+nodeClass(n)+'"><span style="font-weight:600;">'+n.id+'</span> '+n.label+' <span style="opacity:0.7;">'+n.pct+'%</span></div>';
  });
  h+='</div>';

  // 稳定性预警
  if(baseTone<90&&l4q>5){
    h+='<div class="stats-module-hint amber">认知基调低于 90%，检查人格或对话连续性</div>';
  }

  // ── CoD 路由复盘：单环，静态，纯数据 ───────────────────────────
  var flashC=mem.flash_count||0;
  var traceC=mem.trace_back_count||0;
  var totalC=flashC+traceC;
  h+='<div class="stats-cod-section">';
  h+='<div class="stats-cod-header"><span class="stats-cod-title">CoD：动态上下文分流系统</span><span class="stats-cod-total">'+(totalC>0?totalC+' 轮':'暂无数据')+'</span></div>';
  if(totalC===0){
    h+='<div class="stats-cod-empty">积累对话数据后显示</div>';
  }else{
    var flashPct=Math.round(flashC/totalC*100);
    var tracePct=100-flashPct;
    // 中心语义标签
    var modeLabel=flashPct>=80?'直觉主导':flashPct>=60?'热启为主':tracePct>=60?'记忆驱动':'均衡路由';
    var modeLabelColor=flashPct>=60?'#ffe066':'#7ec8e3';
    var r=44,cx=60,cy=60,circ=2*Math.PI*r;
    var flashDash=circ*(flashPct/100);
    var traceDash=circ*(tracePct/100);
    var ringOpacity=Math.max(0.7,compositeRate/100);
    h+='<div class="stats-cod-ring-row">';
    h+='<div class="stats-cod-ring-wrap">';
    h+='<svg width="120" height="120" viewBox="0 0 120 120">';
    h+='<defs><filter id="codGlow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="11"/>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#ffe066" stroke-width="11" stroke-linecap="butt" stroke-dasharray="'+flashDash+' '+circ+'" transform="rotate(-90 '+cx+' '+cy+')" opacity="'+ringOpacity+'" filter="url(#codGlow)"/>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#7ec8e3" stroke-width="11" stroke-linecap="butt" stroke-dasharray="'+traceDash+' '+circ+'" transform="rotate('+((-90)+flashPct*3.6)+' '+cx+' '+cy+')" opacity="'+ringOpacity+'" filter="url(#codGlow)"/>';

// 场景分布增强版
function buildSceneModule(s){

  var h='<div class="stats-section"><div class="stats-section-title">'+t('dash.scene.title')+'</div>';
  if(totalSceneTokens>0){

    sorted.forEach(function(sc){
      var t=(bs[sc.k]||{}).tokens||0,r=(bs[sc.k]||{}).requests||0;

      h+='<div class="stats-bar-track"><div class="stats-bar-fill '+sc.k+'" style="width:'+barW+'%"></div></div>';

// 7天趋势增强版
function buildTrendModule(s){
  var byDay=s.by_day||{};
  var dayKeys=[];var now=new Date();
  for(var di=6;di>=0;di--){var dd=new Date(now);dd.setDate(dd.getDate()-di);dayKeys.push(dd.toISOString().slice(0,10));}
  window._statsTrendData={byDay:byDay,dayKeys:dayKeys};
  var h='<div class="stats-section"><div class="stats-section-title" style="justify-content:space-between;">';
  h+='<span>'+t('dash.trend.title')+'</span>';
  h+='<div style="display:flex;gap:4px;">';
  var dims=[{k:'tokens',n:t('dash.trend.tokens')},{k:'requests',n:t('dash.trend.requests')}];
  dims.forEach(function(d,i){
    var active=i===0?' stats-highlight':'';
    h+='<span class="stats-trend-tab'+active+'" data-dim="'+d.k+'" onclick="switchTrendDim(\''+d.k+'\')" style="cursor:pointer;font-size:11px;padding:2px 8px;border-radius:6px;'+(i===0?'background:rgba(106,170,136,0.12);':'')+'">'+d.n+'</span>';
  });
  h+='</div></div>';
  h+='<div id="statsTrendChart">'+renderTrendBars(byDay,dayKeys,'tokens')+'</div>';
  var first=(byDay[dayKeys[0]]||{}).tokens||0,last=(byDay[dayKeys[6]]||{}).tokens||0;
  var activeDays=0;dayKeys.forEach(function(dk){if((byDay[dk]||{}).tokens>0)activeDays++;});
  var hint='';
  if(activeDays<=2){
    hint=t('dash.trend.accumulating');
  }else if(first>0&&last>0){
    var change=Math.round((last-first)/Math.max(first,1)*100);
    if(change>30) hint=tf('dash.trend.up',change);
    else if(change<-30) hint=t('dash.trend.down');
    else hint=t('dash.trend.stable');
  }else{hint=t('dash.trend.building');}
  h+='<div class="stats-module-hint" style="margin-top:8px;">'+hint+'</div></div>';
  return h;
}

function renderTrendBars(byDay,dayKeys,dim){
  var dayMax=0;
  dayKeys.forEach(function(dk){var v=(byDay[dk]||{})[dim]||0;if(v>dayMax)dayMax=v;});
  if(dayMax===0) return '<div style="text-align:center;padding:16px;color:#64748b;font-size:13px;">'+t('dash.trend.nodata')+'</div>';
  var h='<div class="stats-trend"><div class="stats-trend-bars">';
  dayKeys.forEach(function(dk){
    var v=(byDay[dk]||{})[dim]||0;
    var pct=dayMax>0?Math.max(3,Math.round(v/dayMax*100)):3;
    h+='<div class="stats-trend-col"><div class="stats-trend-val">'+fmtN(v)+'</div><div class="stats-trend-bar" style="height:'+pct+'%"></div><div class="stats-trend-label">'+dk.slice(5)+'</div></div>';
  });
  h+='</div></div>';
  return h;
}

function switchTrendDim(dim){
  var d=window._statsTrendData;if(!d)return;
  document.getElementById('statsTrendChart').innerHTML=renderTrendBars(d.byDay,d.dayKeys,dim);
  var tabs=document.querySelectorAll('.stats-trend-tab');
  tabs.forEach(function(t){
    if(t.getAttribute('data-dim')===dim){t.classList.add('stats-highlight');t.style.background='rgba(106,170,136,0.12)';}
    else{t.classList.remove('stats-highlight');t.style.background='';}
  });
}

// 系统诊断区
function buildDiagModule(s){
  var items=[];
  var pr=s.prices||getPrice(s.model);
  var cHit=s.cache_read_tokens||0;var cMiss=(s.input_tokens||0)-cHit;var costYuan=(Math.max(0,cMiss)*pr.i+cHit*pr.i*0.1+(s.output_tokens||0)*pr.o)/1e6;
  var totalReq=s.total_requests||0;
  var avgT=totalReq>0?Math.round((s.total_tokens||0)/totalReq):0;
  var inp=s.input_tokens||0,out=s.output_tokens||0;
  var cacheRead=s.cache_read_tokens||0;
  var cacheRate=inp>0?Math.round(cacheRead/inp*100):0;
  var mem=s.memory||{};
  var l2s=mem.l2_searches||0,l2h=mem.l2_hits||0;
  var l8s=mem.l8_searches||0,l8h=mem.l8_hits||0;
  var l2rate=l2s>0?Math.round(l2h/l2s*100):0;
  var l8rate=l8s>0?Math.round(l8h/l8s*100):0;
  var bs=s.by_scene||{};
  if(costYuan>10) items.push({t:'warn',m:tf('dash.diag.costHigh',costYuan.toFixed(2))});
  else if(costYuan>0) items.push({t:'ok',m:tf('dash.diag.costOk',costYuan.toFixed(2))});
  if(inp>0&&out>inp*2) items.push({t:'warn',m:tf('dash.diag.outputHigh',Math.round(out/inp))});
  if(cacheRate>=50) items.push({t:'ok',m:tf('dash.diag.cacheSaved',fmtN(cacheRead))});
  if(l2rate>=30&&l8rate>=20) items.push({t:'ok',m:t('dash.diag.memGood')});
  else if(l8rate<10&&l8s>5) items.push({t:'warn',c:'mem',m:tf('dash.diag.l8Low',l8rate)});
  if(l2rate<20&&l2s>5) items.push({t:'warn',c:'mem',m:tf('dash.diag.l2Low',l2rate)});
  var totalST=0;
  [{k:'chat'},{k:'skill'}].forEach(function(sc){totalST+=(bs[sc.k]||{}).tokens||0;});
  var chatPct=totalST>0?Math.round(((bs.chat||{}).tokens||0)/totalST*100):0;
  if(chatPct>=85) items.push({t:'warn',m:tf('dash.diag.chatHigh',chatPct)});
  if(avgT>2000) items.push({t:'warn',m:tf('dash.diag.avgHigh',fmtN(avgT))});
  if(items.length===0) items.push({t:'ok',m:t('dash.diag.allOk')});
  // 成本×记忆关联
  var avgCostD=totalReq>0?costYuan/totalReq:0;
  var skillReqs=(bs.skill||{}).requests||0;
  if(l2rate>=80&&avgCostD<0.01&&totalReq>50) items.push({t:'ok',c:'mem',m:tf('dash.diag.memCost',avgCostD.toFixed(4))});
  if(skillReqs>20) items.push({t:'ok',c:'scene',m:tf('dash.diag.skillRoute',skillReqs)});
  var h='<div class="stats-section"><div class="stats-section-title">'+t('dash.diag.title')+'</div><div class="stats-diag">';
  items.forEach(function(it){
    var dotCls=it.t==='warn'?' warn':''; if(it.c==='cost')dotCls+=' cost'; else if(it.c==='mem')dotCls+=' mem'; else if(it.c==='scene')dotCls+=' scene';
    h+='<div class="stats-diag-item"><div class="stats-diag-dot'+dotCls+'"></div><div>'+it.m+'</div></div>';
  });
  h+='</div></div>';
  return h;
}
</script>

/* ===== 侧边栏拉伸功能 ===== */
function initSidebarResize(){
 var sidebar=document.querySelector('.sidebar');
 var isResizing=false;
 var startX,startWidth;
 
 function startResize(e){
  isResizing=true;
  startX=e.clientX||e.touches[0].clientX;
  startWidth=parseInt(getComputedStyle(sidebar).width,10);
  document.addEventListener('mousemove',resize);
  document.addEventListener('mouseup',stopResize);
  document.addEventListener('touchmove',resize);
  document.addEventListener('touchend',stopResize);
  sidebar.style.transition='none';
  document.body.style.userSelect='none';
 }
 
 function resize(e){
  if(!isResizing)return;
  var clientX=e.clientX||(e.touches&&e.touches[0].clientX);
  if(!clientX)return;
  
  var diff=clientX-startX;
  var newWidth=Math.max(200,Math.min(400,startWidth+diff));
  sidebar.style.width=newWidth+'px';
 }
 
 function stopResize(){
  if(!isResizing)return;
  isResizing=false;
  sidebar.style.transition='width 0.2s';
  document.body.style.userSelect='';
  document.removeEventListener('mousemove',resize);
  document.removeEventListener('mouseup',stopResize);
  document.removeEventListener('touchmove',resize);
  document.removeEventListener('touchend',stopResize);
  
  // 保存宽度到本地存储
  localStorage.setItem('nova_sidebar_width',sidebar.style.width);
 }
 
 // 添加事件监听
 sidebar.addEventListener('mousedown',function(e){
  if(e.offsetX>sidebar.offsetWidth-8){
   startResize(e);
  }
 });
 
 sidebar.addEventListener('touchstart',function(e){
  var touchX=e.touches[0].clientX;
  var rect=sidebar.getBoundingClientRect();
  if(touchX>rect.right-20){
   startResize(e);
  }
 });
 
 // 加载保存的宽度
 var savedWidth=localStorage.getItem('nova_sidebar_width');
 if(savedWidth){
  sidebar.style.width=savedWidth;
 }
}

   var html='<div class="step-tracker">';

   });

  function _planCssStatus(status){
   status=String(status||'pending');
   if(status==='done') return 'done';
   if(status==='running') return 'running';
   if(status==='waiting_user') return 'waiting-user';
   if(status==='blocked' || status==='error' || status==='failed') return 'error';

  function _renderPlanStrip(plan){

   var html='<div class="plan-strip">';

   html+='<div class="plan-items">';
   items.forEach(function(item){

    var cls='plan-item'+(status?' '+status:'');
    html+='<div class="'+cls+'">'+escapeHtml(String((item&&item.title)||''))+'</div>';
   });
   html+='</div>';
   html+='</div>';
   return html;
  }

  var html='';

 window._loadMoreHistory=function(){
  if(window._historyLoading||!window._historyHasMore) return;
