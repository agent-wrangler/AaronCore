<!DOCTYPE html>
<html class="theme-light"><head><meta charset="UTF-8"><title>Nova</title>
<style>*{margin:0;padding:0;box-sizing:border-box;user-select:text}
html{background:#FFFFFF}
html.theme-light{background:#FFFFFF}
html.theme-dark{background:#161618}

/* 旧的 frameless 缩放触发层（当前 Electron 原生缩放为主，保留不显示） */
.resize-edge,.resize-corner{display:none!important}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1e1e20}
::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#4a4a4a}
:root{
 --bg-app:#161618;
 --bg-top:#1e1e20;
 --bg-sidebar:#161618;
 --bg-main:#1e1e20;
 --bg-chat:#161618;
 --bubble-line-height:1.6;
 --surface-ai:rgba(36,36,40,0.92);
 --surface-user:linear-gradient(135deg,#6b7280 0%,#4b5563 100%);
 --surface-input:rgba(28,28,30,0.92);
 --border-soft:rgba(255,255,255,0.07);
 --text-main:#ebebf0;
 --text-soft:#8e8e93;
 --accent:#9ca3af;
 --accent-soft:rgba(79,142,247,0.14);
 --text-primary:#e2e8f0;
 --text-secondary:#b7c3d4;
 --text-label:#94a3b8;
 --bg-soft:rgba(255,255,255,0.03);
 --bg-card:rgba(36,36,40,0.92);
 --border-card:rgba(255,255,255,0.05);
 --shadow-card:0 8px 24px rgba(0,0,0,0.14);
 --bg-input:#1e1e20;
 --border-input:#333;
 --bg-chip:rgba(255,255,255,0.04);
 --text-chip:#94a3b8;
 --border-chip:rgba(255,255,255,0.08);
 --bg-chip-active:linear-gradient(135deg,#6b7280 0%,#4b5563 100%);
 --bg-growth:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));
 --bg-tag-pill:rgba(255,255,255,0.04);
 --border-tag-pill:rgba(255,255,255,0.08);
 --bg-badge:rgba(150,150,160,0.16);
 --border-badge:rgba(150,150,160,0.2);
 --text-badge:#c7d2fe;
 --bar-track:rgba(255,255,255,0.08);
 --bar-fill:linear-gradient(90deg,#6366f1,#8b5cf6);
 --glow-line:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
}

body.light{
 --bg-app:#FFFFFF;
 --text-primary:#1a1a1a;
 --text-secondary:#475569;
 --text-label:#64748b;
 --bg-soft:#f8fafc;
 --bg-card:#ffffff;
 --border-card:rgba(148,163,184,0.28);
 --shadow-card:0 6px 20px rgba(0,0,0,0.06);
 --bg-input:#fff;
 --border-input:#d1d5db;
 --bg-chip:#fff;
 --text-chip:#6b7280;
 --border-chip:#e5e7eb;
 --bg-growth:linear-gradient(135deg,#eef2ff,#f5f3ff);
 --bg-tag-pill:rgba(255,255,255,0.78);
 --border-tag-pill:rgba(120,120,130,0.12);
 --bg-badge:rgba(100,100,110,0.1);
 --border-badge:rgba(100,100,110,0.14);
 --text-badge:#374151;
 --bar-track:#e5e7eb;
 --bar-fill:linear-gradient(90deg,#818cf8,#a78bfa);
 --glow-line:linear-gradient(90deg,transparent,rgba(0,0,0,0.04),transparent);
}
/* 记忆标签 · 彩虹色（暗色默认） */
.mem-tag{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:700;flex-shrink:0}
.mem-tag-L1{background:#1e2530;color:#94a3b8}
.mem-tag-L2{background:#3b1010;color:#fca5a5}
.mem-tag-L3{background:#3b1e08;color:#fdba74}
.mem-tag-L4{background:#3b2e08;color:#fde047}
.mem-tag-L5{background:#0a2e14;color:#86efac}
.mem-tag-L6{background:#083344;color:#67e8f9}
.mem-tag-L7{background:#0c1a3e;color:#93c5fd}
.mem-tag-L8{background:#1e1040;color:#c4b5fd}
.mem-tag-default{background:#2a2a2e;color:#94a3b8}
body.light .mem-tag-L1{background:#f1f5f9;color:#475569}
body.light .mem-tag-L2{background:#fee2e2;color:#dc2626}
body.light .mem-tag-L3{background:#ffedd5;color:#ea580c}
body.light .mem-tag-L4{background:#fef3c7;color:#ca8a04}
body.light .mem-tag-L5{background:#dcfce7;color:#16a34a}
body.light .mem-tag-L6{background:#cffafe;color:#0891b2}
body.light .mem-tag-L7{background:#dbeafe;color:#2563eb}
body.light .mem-tag-L8{background:#ede9fe;color:#7c3aed}
body.light .mem-tag-default{background:#f1f5f9;color:#475569}
body.light .sidebar{background:#ffffff;box-shadow:2px 0 18px rgba(22,22,24,0.06)}
body.light .menu{color:#334155}
body.light .menu:hover{background:#eff6ff;color:#374151}
body.light .menu.active{background:#e5e7eb;color:#374151}
body.light .chat{background:#fafbfc}
body.light .bubble{background:transparent;color:#1c1c1e;box-shadow:none;border:none}
body.light .msg.assistant .bubble{background:transparent;color:#1c1c1e;border:none}
body.light .msg.user .bubble{background:rgba(59,130,246,0.1);color:#111;border:none}
body.light .input{background:transparent;border-top:none}
body.light .input textarea{background:transparent;color:#161618;border:none}
body.light::-webkit-scrollbar-track{background:#f1f5f9}
body.light::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
body.light::-webkit-scrollbar-thumb:hover{background:#94a3b8}
body.light .chat::-webkit-scrollbar-track{background:#f1f5f9}
body.light .chat::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
body.light .chat::-webkit-scrollbar-thumb:hover{background:#94a3b8}
body.light .chat *::-webkit-scrollbar-track{background:#f1f5f9}
body.light .chat *::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
body.light .chat *::-webkit-scrollbar-thumb:hover{background:#94a3b8}
body{font-family:'Segoe UI','Microsoft YaHei UI','Microsoft YaHei',system-ui,-apple-system,sans-serif;background:var(--bg-app);color:var(--text-main);height:100vh;overflow:hidden;display:flex}
/* ===== 优雅可拉伸侧边栏 ===== */
.sidebar{
 width:240px;
 min-width:200px;
 max-width:400px;
 background:#1a1a1c;
 display:flex;
 flex-direction:column;
 padding:20px 0;
 border-right:1px solid #2a2a2e;
 position:relative;
 transition:width 0.2s;
}

/* 优雅拉伸手柄（悬停时显示） */
.sidebar::after{
 content:'';
 position:absolute;
 top:50%;
 right:0;
 transform:translateY(-50%);
 width:3px;
 height:40px;
 background:rgba(79,142,247,0);
 border-radius:2px;
 cursor:col-resize;
 z-index:10;
 transition:all 0.2s;
}

.sidebar:hover::after{
 background:rgba(79,142,247,0.3);
}

.sidebar:active::after{
 background:rgba(79,142,247,0.5);
 width:4px;
}

/* 亮色主题适配 */
body.light .top-bar{
 background:linear-gradient(180deg,rgba(255,255,255,0.98) 0%,rgba(248,250,252,0.96) 100%);
 border-bottom:1px solid rgba(148,163,184,0.22);
}

body.light .sidebar{
 background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);
 border-right:1px solid rgba(148,163,184,0.22);
}

body.light .sidebar::after{
 background:rgba(0,0,0,0);
}

body.light .sidebar:hover::after{
 background:rgba(180,180,190,0.2);
}

body.light .sidebar:active::after{
 background:rgba(180,180,190,0.4);
}
.logo{font-size:24px;font-weight:700;color:#ebebf0;padding:0 20px 20px;display:flex;align-items:center;gap:10px}
.logo:before{
 content:'✦';
 font-weight:300;
}
.menu{display:flex;align-items:center;gap:14px;padding:13px 18px;color:#94a3b8;cursor:pointer;transition:all 0.2s;font-size:15px;border-left:3px solid transparent;position:relative}
.menu:hover{background:rgba(255,255,255,0.06);color:#ebebf0}
.menu.active{background:rgba(255,255,255,0.08);color:#ffffff;border-left-color:#ffffff}
.menu .icon{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:currentColor;opacity:.9;transition:transform 0.2s}
.menu:hover .icon{transform:scale(1.15)}
.menu:active .icon{transform:scale(0.95)}
.menu .icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.menu .label{flex:1;line-height:1;display:flex;align-items:center}
.menu.active .icon{opacity:1}

/* 侧边栏底部 */
.sidebar-footer {
  margin-top: auto;
  padding: 14px 18px;
  font-size: 11px;
  color: #64748b;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid rgba(148, 163, 184, 0.08);
}
.sidebar-footer-item {
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1;
}
.sidebar-footer-item svg {
  flex-shrink: 0;
  opacity: 0.6;
}
.sidebar-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sidebar-dot.online {
  background: #22c55e;
  box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
}
body.light .menu .icon{color:currentColor}
body.light .menu.active .icon{color:currentColor}
/* ===== 真正覆盖整个宽度的顶部通栏 ===== */
body{
 font-family:'Segoe UI','Microsoft YaHei UI','Microsoft YaHei',system-ui,-apple-system,sans-serif;
 background:var(--bg-app);
 color:#e2e8f0;
 height:100vh;
 overflow:hidden;
 display:flex;
 flex-direction:column; /* 改为列布局 */
}

.window-shell{
 width:100vw;
 height:100vh;
 margin:0;
 display:flex;
 flex-direction:column;
 overflow:hidden;
  border-radius:16px;
  background:var(--bg-app);
 box-shadow:none;
  isolation:isolate;
}

.window-shell.is-maximized{
 width:100vw;
 height:100vh;
 margin:0;
 border-radius:0;
 box-shadow:none;
}

/* 顶部通栏 */
.top-bar{
 height:60px;
 background:#161618;
 border-bottom:1px solid var(--border-soft);
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 16px;
 position:relative;
 z-index:100;
 width:100%;
 flex-shrink:0;
}

/* NovaCore标志 */
.top-bar-spacer{flex:1;}
.nova-logo{
 display:flex;
 align-items:center;
 gap:8px;
 font-size:20px;
 font-weight:700;
 color:#ebebf0;
}

.nova-logo:before{
 content:'✦';
 font-weight:300;
 font-size:24px;
}

/* 主内容区域（侧边栏+聊天区域） */
.main-container{
 display:flex;
 flex:1;
 overflow:hidden;
}

/* 侧边栏现在在main-container内 */
.sidebar{
 width:240px;
 min-width:200px;
 max-width:400px;
 background:linear-gradient(180deg,#161618 0%,#161618 100%);
 display:flex;
 flex-direction:column;
 padding:20px 0;
 border-right:1px solid var(--border-soft);
 position:relative;
 transition:width 0.2s;
 flex-shrink:0;
}

/* 主聊天区域 — 底色与 .chat 渐变终点一致 */
.main{
 flex:1;
 display:flex;
 flex-direction:column;
 overflow:hidden;
 background:#161618;
}
body.light .main{
 background:#fafbfc;
}

.top-btn{
 width:40px;
 height:40px;
 background:rgba(255,255,255,0.05);
 border:1px solid rgba(255,255,255,0.08);
 border-radius:10px;
 color:#94a3b8;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
 transition:all 0.2s;
}

.top-btn:hover{
 background:rgba(255,255,255,0.1);
 color:#e2e8f0;
 border-color:rgba(255,255,255,0.12);
 transform:translateY(-1px);
}

.top-btn:active{
 transform:translateY(0);
}

.top-btn svg{
 width:18px;
 height:18px;
 stroke:currentColor;
 stroke-width:1.5;
}

/* 亮色主题下的顶部按钮 */
body.light .top-btn{
 background:rgba(255,255,255,0.86);
 border:1px solid rgba(148,163,184,0.25);
 color:#475569;
}

body.light .top-btn:hover{
 background:#eff6ff;
 color:#312e81;
 border-color:rgba(180,180,190,0.24);
}

/* 亮色主题下的NovaCore标志 */
body.light .nova-logo{
 color:#4b5563;
}
.content{flex:1;overflow:hidden;position:relative}

/* 底部渐隐遮罩 — 从 .input 向上投射，覆盖在聊天内容之上 */
.input::before {
  content: "";
  position: absolute;
  bottom: 100%;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to bottom, transparent, #161618);
  pointer-events: none;
  z-index: 1;
}
body.light .input::before {
  background: linear-gradient(to bottom, transparent, #fafbfc);
}

/* ===== 回到底部按钮 ===== */
.scroll-to-bottom-btn {
  position: absolute;
  right: 20px;
  bottom: 20px;
  z-index: 10;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(148,163,184,0.2);
  background: rgba(30,32,40,0.88);
  color: #94a3b8;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.28);
  transition: opacity 0.2s, transform 0.2s, background 0.15s;
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
}
.scroll-to-bottom-btn.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.scroll-to-bottom-btn:hover {
  background: rgba(55,65,90,0.95);
  color: #c4b5fd;
}
body.light .scroll-to-bottom-btn {
  background: rgba(255,255,255,0.92);
  border-color: rgba(0,0,0,0.1);
  color: #64748b;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
body.light .scroll-to-bottom-btn:hover {
  background: #f1f5f9;
  color: #6d28d9;
}
/* ===== 简约现代聊天气泡 ===== */
.chat {
  height: 100%;
  overflow-y: scroll;
  padding: 20px 18px 104px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background:linear-gradient(180deg,#1e1e20 0%,#161618 100%);
  scroll-behavior: smooth;
}
.chat > .msg {
  flex-shrink: 0;
  width: var(--content-width);
  max-width: calc(100% - 2px);
}

/* ===== 欢迎页 ===== */
.welcome {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 60px;
  opacity: 0.9;
  padding: 0 40px 40px;
  max-width: 900px;
  margin: 0 auto;
}
.welcome-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  min-width: 260px;
}
.welcome-avatar {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
}
.welcome-title {
  font-size: 22px;
  font-weight: 600;
  color: #e2e8f0;
}
.welcome-sub {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 16px;
}
.welcome-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  max-width: 320px;
}
.welcome-chip {
  padding: 8px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: #9ca3af;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.welcome-chip:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.14);
  color: #e2e8f0;
  transform: translateY(-1px);
}
.welcome-chip:active {
  transform: translateY(0);
}
.welcome-right {
  width: 280px;
  flex-shrink: 0;
}
.welcome-news-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: #6b7280;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.welcome-news-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.welcome-news-item {
  font-size: 13px;
  color: #9ca3af;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  line-height: 1.5;
  transition: color 0.15s;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.welcome-news-item:hover { color: #e2e8f0; }
.welcome-news-item:last-child { border-bottom: none; }
/* 亮色主题 */
body.light .welcome-title { color: #1a1a1a; }
body.light .welcome-sub { color: #64748b; }
body.light .welcome-avatar { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); color: #6b7280; }
body.light .welcome-chip {
  background: rgba(0,0,0,0.04);
  border-color: rgba(0,0,0,0.08);
  color: #374151;
}
body.light .welcome-chip:hover {
  background: rgba(0,0,0,0.07);
  color: #111;
}
body.light .welcome-news-title { color: #9ca3af; }
body.light .welcome-news-item { color: #6b7280; border-bottom-color: rgba(0,0,0,0.06); }
body.light .welcome-news-item:hover { color: #111; }

/* 消息容器 — 文本共用中轴列，头像悬挂在两侧 */
.msg {
  --avatar-size: 22px;
  --avatar-gap: 14px;
  --avatar-slot: 0px;
  --content-width: min(94%, 1680px);
  display: flex;
  gap: 0;
  max-width: 100%;
  margin-bottom: 0;
  position: relative;
  align-items: flex-start;
  padding: 4px 0;
}

/* 不同角色之间拉开间距 */
.msg.assistant + .msg.user,
.msg.user + .msg.assistant {
  margin-top: 20px;
}

/* 同角色连续消息紧凑 */
.msg.assistant + .msg.assistant,
.msg.user + .msg.user {
  margin-top: 2px;
}

/* AI消息 */
.msg.assistant {
  align-self: center;
}

/* 用户消息 — 右侧保留头像槽位，正文仍走同一文本列 */
.msg.user {
  align-self: center;
}

/* 头像 — 绝对定位到消息两侧，不占正文列宽 */
.avatar {
  width: var(--avatar-size);
  height: var(--avatar-size);
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 9px;
  margin-top: 1px;
  align-self: flex-start;
  opacity: 0.6;
  position: absolute;
  top: 5px;
}

.msg .avatar {
  display: none;
}

.msg.assistant .avatar {
  left: 0;
  margin-right: 0;
}

.msg.user .avatar {
  right: 0;
  margin-left: 0;
}

/* AI头像 */
.msg.assistant .avatar {
  background: linear-gradient(135deg, #9ca3af 0%, #4b5563 100%);
  color: white;
}

/* 用户头像 */
.msg.user .avatar {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
}

/* 消息内容区域 — 占满中间文本列 */
.msg-content {
  display: flex;
  flex-direction: column;
  max-width: 100%;
  min-width: 0;
  flex: 1;
  gap: 1px;
}

.msg.assistant .msg-content {
  align-items: flex-start;
  padding-left: 19px;  /* 和 step-item 的 icon(12px)+gap(7px) 对齐 */
}

.msg.user .msg-content {
  align-items: flex-start;
}

/* 文本内容 — 纯文字，无盒子 */
.bubble {
  padding: 0;
  line-height: 1.6;
  font-family: 'Microsoft YaHei UI', 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', system-ui, sans-serif;
  word-break: break-word;
  overflow-wrap: break-word;
  white-space: normal;
  border-radius: 0;
  border: none;
  position: relative;
  box-shadow: none;
  background: transparent;
  font-size: 14px;
  width: 100%;
}

.bubble-body {
  display: block;
  width: 100%;
}

.bubble > :first-child {
  margin-top: 0 !important;
}

.bubble > :last-child {
  margin-bottom: 0 !important;
}

/* AI文本 */
.msg.assistant .bubble {
  background: transparent;
  color: var(--text-main, #e5eefb);
  border: none;
  backdrop-filter: none;
  line-height: 1.46;
}

/* ===== AI 输出结构化排版 ===== */
.bubble-h1 {
  font-size: 18px;
  font-weight: 800;
  margin: 20px 0 8px 0;
  color: inherit;
  line-height: 1.3;
}
.bubble-h2 {
  font-size: 16px;
  font-weight: 700;
  margin: 16px 0 6px 0;
  color: inherit;
  line-height: 1.35;
}
.bubble-h3 {
  font-size: 14.5px;
  font-weight: 700;
  margin: 12px 0 4px 0;
  color: inherit;
  line-height: 1.4;
}
.bubble-p {
  margin: 6px 0;
  line-height: 1.6;
}
.bubble-p strong:first-child {
  color: inherit;
}
.bubble-spacer {
  height: 8px;
}
.bubble-ul, .bubble-ol {
  margin: 6px 0 6px 20px;
  padding: 0;
  line-height: 1.7;
}
.bubble-ul li, .bubble-ol li {
  margin-bottom: 4px;
}
.bubble-quote {
  margin: 8px 0;
  padding: 6px 14px;
  border-left: 3px solid rgba(148,163,184,0.3);
  color: inherit;
  opacity: 0.8;
  font-style: italic;
}
.bubble-code {
  margin: 10px 0;
  padding: 12px 14px;
  border-radius: 8px;
  background: rgba(0,0,0,0.25);
  overflow-x: auto;
  font-family: Consolas, 'Courier New', monospace;
  font-size: 12.5px;
  line-height: 1.7;
}
body.light .bubble-code {
  background: rgba(0,0,0,0.04);
}
.bubble-inline-code {
  padding: 1px 5px;
  border-radius: 4px;
  background: rgba(255,255,255,0.08);
  font-family: Consolas, 'Courier New', monospace;
  font-size: 12.5px;
}
body.light .bubble-inline-code {
  background: rgba(0,0,0,0.06);
}
body.light .bubble-quote {
  border-left-color: rgba(0,0,0,0.15);
}

.msg.assistant .bubble-p {
  margin: 2px 0;
  line-height: 1.46;
}

.msg.assistant .bubble-p + .bubble-p {
  margin-top: 6px;
}

.msg.assistant .bubble-spacer {
  height: 4px;
}

.msg.assistant .bubble-ul,
.msg.assistant .bubble-ol {
  margin: 6px 0 6px 18px;
  line-height: 1.5;
}

.msg.assistant .bubble-ul li,
.msg.assistant .bubble-ol li {
  margin-bottom: 2px;
}

.msg.assistant .bubble-quote {
  margin: 7px 0;
  padding: 5px 12px;
  line-height: 1.5;
}

/* 用户文本 — 保留气泡，但与共享正文列两端对齐 */
.msg.user .bubble {
  background: #282A2C;
  color: #eef2ff;
  border: none;
  text-align: left;
  padding: 10px 14px;
  border-radius: 14px 4px 14px 14px;
  width: auto;
  min-width: 0;
  max-width: 100%;
  margin-left: auto;
}

/* 消息元信息 — 隐藏昵称和时间，只保留头像 */
.msg-meta {
  display: none;
}

/* 复制按钮 hover 才显示 */
.msg-copy {
  background: none;
  border: none;
  color: #4b5563;
  cursor: pointer;
  padding: 2px 4px;
  font-size: 11px;
  border-radius: 4px;
  transition: all 0.15s;
  opacity: 0;
}
.msg:hover .msg-copy {
  opacity: 1;
}
.msg-copy:hover {
  color: #c4b5fd;
  background: rgba(79, 142, 247, 0.1);
}

/* 元信息统一左对齐 */
.msg.assistant .msg-meta {
  align-self: flex-start;
  justify-content: flex-start;
}

.msg.user .msg-meta {
  align-self: flex-end;
  justify-content: flex-end;
}

.msg-name {
  font-weight: 600;
  color: #64748b;
  font-size: 12px;
}

.msg-time {
  font-size: 11px;
  opacity: 0.4;
  font-weight: 400;
}

/* 亮色主题适配 */
body.light .msg-name {
  color: #374151;
}

body.light .msg-meta {
  color: #9ca3af;
}

body.light .msg.assistant .bubble {
  background: transparent;
  color: #1c1c1e;
  border: none;
}

body.light .msg.user .bubble {
  background: rgba(59, 130, 246, 0.1);
  color: #111;
  border: none;
}

/* 思考动画 */
.thinking {
  display: inline-flex;
  gap: 4px;
  margin-left: 8px;
}

.thinking-msg {
  gap: 12px;
  max-width: min(82%, 760px);
  align-items: flex-start;
}

.thinking-panel {
  display: flex;
  flex-direction: column;
  min-width: 0;
  gap: 10px;
}

.thinking-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  margin-top: 2px;
}

.thinking-msg > .avatar {
  margin-top: 2px;
  margin-bottom: 0;
  align-self: flex-start;
}

.thinking-panel .msg-name {
  color: #dbe7ff;
  font-weight: 600;
}

.thinking-state {
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  color: #d1d5db;
  background: rgba(180, 180, 190, 0.14);
  border: 1px solid rgba(180, 180, 190, 0.2);
  white-space: nowrap;
}

.thinking-stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}

.thinking-bubble {
  width: clamp(320px, 46vw, 480px);
  max-width: min(82vw, 480px);
  min-height: 68px;
  padding: 14px 16px 15px;
  border-radius: 16px 16px 16px 6px;
  background: rgba(24, 34, 54, 0.72);
  border: 1px solid rgba(148, 163, 184, 0.12);
  color: #dbe7ff;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  gap: 12px;
  box-shadow: 0 10px 24px rgba(2, 6, 23, 0.14);
  backdrop-filter: blur(10px);
}

.thinking-bubble.done {
  opacity: 1;
}

.thinking-bubble.active {
  background: rgba(32,32,36,0.92);
  border-color: rgba(180, 180, 190, 0.24);
}

.thinking-bubble-body {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}

.thinking-bubble-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #9ca3af;
}

.thinking-bubble-label:empty {
  display: none;
}

.thinking-bubble.done .thinking {
  display: none;
}

.thinking-bubble-text {
  font-size: 14px;
  line-height: 1.75;
  color: #e5eefb;
}

.thinking-bubble .thinking {
  margin-left: 0;
  flex-shrink: 0;
}

.thinking-final-bubble {
  max-width: min(78vw, 620px);
  margin-top: 2px;
}

.assistant-pending {
  gap: 12px;
  align-items: flex-end;
}

.assistant-pending .avatar {
  margin-top: 0;
  margin-bottom: 2px;
}

.thinking-status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  color: #94a3b8;
  font-size: 13px;
}

.thinking-status-text {
  animation: statusFade 0.5s ease;
}

@keyframes statusFade {
  0% { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}

.thinking span {
  width: 4px;
  height: 4px;
  background: #94a3b8;
  border-radius: 50%;
  animation: pulse 1.4s infinite;
}

.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* 打字机光标 */
.typing-cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: #a78bfa;
  margin-left: 1px;
  vertical-align: text-bottom;
  animation: blink 0.6s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── 渐进式渲染：新块 fade-in 动画 ── */
@keyframes blockFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.block-fade-in {
  animation: blockFadeIn 0.3s ease-out both;
}

/* 亮色主题适配 */
body.light .msg-name {
  color: #1a1a1a;
}

body.light .msg-meta {
  color: #64748b;
}

body.light .msg.assistant .bubble {
  background: transparent;
  color: #1c1c1e;
  border: none;
  box-shadow: none;
}

body.light .msg.user .bubble {
  background: rgba(59, 130, 246, 0.12);
  color: #111;
  border: none;
  box-shadow: none;
}

body.light .thinking-panel .msg-name {
  color: #334155;
}

body.light .thinking-state {
  color: #4b5563;
  background: rgba(180, 180, 190, 0.1);
  border-color: rgba(180, 180, 190, 0.16);
}

body.light .thinking-bubble {
  background: rgba(255, 255, 255, 0.96);
  color: #1a1a1a;
  border-color: rgba(148, 163, 184, 0.24);
  box-shadow: 0 10px 24px rgba(148, 163, 184, 0.14);
}

body.light .thinking-bubble.active {
  background: rgba(238, 242, 255, 0.98);
  border-color: rgba(180, 180, 190, 0.2);
}

body.light .thinking-bubble-label {
  color: #4b5563;
}

body.light .thinking-bubble-text {
  color: #1a1a1a;
}

/* ===== 步骤追踪器 ===== */
.msg-content-wrap {
  display: flex;
  flex-direction: column;
  min-width: 0;
  gap: 4px;
}

.step-tracker {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 2px 0 0 0;
  position: relative;
  z-index: 3;
  overflow: hidden;
}

.plan-strip {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 0 0 8px 0;
}

.plan-goal {
  color: #d7e0ea;
  font-size: 12px;
  line-height: 1.45;
  font-weight: 500;
}

.plan-summary {
  color: #7c8aa0;
  font-size: 12px;
  line-height: 1.45;
}

.plan-items {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.plan-item {
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  line-height: 1.2;
  border: 1px solid rgba(124, 138, 160, 0.22);
  color: #8ea0b5;
  background: rgba(124, 138, 160, 0.08);
}

.plan-item.done {
  color: #c6d2de;
  background: rgba(148, 163, 184, 0.12);
  border-color: rgba(148, 163, 184, 0.24);
}

.plan-item.running {
  color: #d7e0ea;
  background: rgba(96, 165, 250, 0.12);
  border-color: rgba(96, 165, 250, 0.28);
}
.plan-item.waiting-user {
  color: #fcd34d;
  background: rgba(245, 158, 11, 0.14);
  border-color: rgba(245, 158, 11, 0.3);
}

.plan-item.error {
  color: #fecaca;
  background: rgba(248, 113, 113, 0.12);
  border-color: rgba(248, 113, 113, 0.28);
}

.step-tracker::before {
  content: none;
}

.step-tracker.collapsed {
  display: flex !important;
}

.step-tracker.collapsed .step-item {
  display: none;
}

.step-tracker-toggle {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 0 0 0 18px;
  font-size: 11px;
  color: #7c8aa0;
  cursor: pointer;
  user-select: none;
  border: none;
  background: none;
  font-family: inherit;
  position: relative;
  z-index: 4;
  pointer-events: auto;
}

.step-tracker-toggle:hover {
  color: #cbd5e1;
}

.step-tracker.collapsed .step-tracker-toggle,
.step-tracker .step-tracker-toggle.visible {
  display: inline-flex;
}

.step-tracker-toggle svg {
  width: 12px;
  height: 12px;
  transition: transform 0.2s;
}

.step-tracker-toggle svg {
  width: 12px;
  height: 12px;
  transition: transform 0.2s;
}

.step-tracker:not(.collapsed) .step-tracker-toggle svg {
  transform: rotate(180deg);
}

.step-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 1px 0 4px 0;
  font-size: 12px;
  position: relative;
  animation: stepFadeIn 0.22s ease;
  transition: opacity 0.18s ease, color 0.18s ease;
}

.step-item::after {
  content: none;
}

@keyframes stepFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-icon {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin-top: 4px;
  z-index: 1;
}

.step-icon.running {
  color: #7dd3fc;
}

.step-icon.running::after {
  content: '';
  width: 10px;
  height: 10px;
  border: 1.5px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: stepSpin 0.8s linear infinite;
}

@keyframes stepSpin {
  to { transform: rotate(360deg); }
}

.step-icon.done {
  color: #94a3b8;
}

.step-icon.done::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: currentColor;
}

.step-icon.error {
  color: #f87171;
}

.step-icon.error::after {
  content: '!';
  font-size: 11px;
  font-weight: 700;
}

.step-main {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  min-width: 0;
  flex: 1;
}

.step-label {
  color: #d7e0ea;
  display: block;
  font-size: 12px;
  line-height: 1.45;
  font-weight: 500;
  white-space: nowrap;
  width: 52px;
  min-width: 52px;
  overflow: hidden;
}

.step-detail {
  color: #7c8aa0;
  display: block;
  font-size: 12px;
  line-height: 1.45;
  white-space: normal;
  overflow: hidden;
  min-width: 0;
  word-break: break-word;
}

.step-item.done {
  opacity: 0.72;
}

.step-item.running {
  opacity: 1;
}

.step-item.error {
  opacity: 0.9;
}

.step-item.expandable {
  cursor: pointer;
}

.step-item.expandable:hover .step-label,
.step-item.expandable:hover .step-detail {
  color: #e7edf5;
}

.step-item.expanded {
  opacity: 1;
}

.step-item.expanded .step-detail {
  display: block;
  white-space: pre-wrap;
}

.step-tracker-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 0 4px 0;
  color: #9fb0c4;
  font-size: 12px;
  letter-spacing: 0.01em;
}

.step-tracker-status::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 999px;
  background: #60a5fa;
  box-shadow: 0 0 10px rgba(96, 165, 250, 0.28);
  flex-shrink: 0;
}

/* 白天模式适配 */
body.light .step-label {
  color: #1f2937;
}

body.light .plan-goal {
  color: #1f2937;
}

body.light .plan-summary {
  color: #64748b;
}

body.light .plan-item {
  color: #64748b;
  background: rgba(148, 163, 184, 0.08);
  border-color: rgba(148, 163, 184, 0.22);
}

body.light .plan-item.done {
  color: #334155;
}

body.light .plan-item.running {
  color: #1f2937;
  background: rgba(59, 130, 246, 0.10);
  border-color: rgba(59, 130, 246, 0.24);
}

body.light .step-detail {
  color: #64748b;
}

body.light .step-tracker-toggle {
  color: #64748b;
}

body.light .step-tracker-toggle:hover {
  color: #1f2937;
}

body.light .step-item.done {
  opacity: 0.74;
}

body.light .step-tracker-status {
  color: #64748b;
}

body.light .step-item.expandable:hover .step-label,
body.light .step-item.expandable:hover .step-detail {
  color: #111827;
}

@media (max-width: 720px) {
  .step-tracker-status {
    padding: 0 0 4px 0;
  }

  .step-tracker-toggle {
    padding-left: 18px;
  }

  .step-item {
    gap: 7px;
    padding: 1px 0 4px 0;
  }

  .step-label,
  .step-detail {
    white-space: normal;
  }

  .step-main {
    gap: 4px;
  }
}

/* ===== 未来感输入区域 ===== */
:root {
  --primary-gradient: linear-gradient(135deg, #9ca3af 0%, #4b5563 100%);
  --primary-hover: linear-gradient(135deg, #3b7de8 0%, #1d5fc4 100%);
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --future-blue: rgba(255,255,255,0.45);
  --future-purple: rgba(255,255,255,0.2);
  --glow-color: rgba(255,255,255,0.1);
}

.repair-bar {
  padding: 0 24px;
  margin-bottom: 0;
}

.repair-bar-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 10px 10px 0 0;
  background: rgba(180, 180, 190, 0.10);
  border: 1px solid rgba(180, 180, 190, 0.18);
  border-bottom: none;
  color: #d1d5db;
  font-size: 13px;
  line-height: 1.5;
}

.repair-bar-icon {
  flex-shrink: 0;
  color: #9ca3af;
  display: flex;
  align-items: center;
}

.repair-bar-text {
  flex: 1;
  min-width: 0;
  display: flex;
  gap: 8px;
  align-items: baseline;
  flex-wrap: wrap;
}

.repair-bar-headline {
  font-weight: 600;
  color: #e5e7eb;
  white-space: nowrap;
}

.repair-bar-detail {
  color: #9ca3af;
  font-size: 12px;
}

.repair-bar-close {
  background: none;
  border: none;
  color: #94a3b8;
  font-size: 16px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  flex-shrink: 0;

.repair-bar-close:hover {

}

.repair-bar-progress {

  background: rgba(180, 180, 190, 0.12);
  border-radius: 0 0 4px 4px;
  overflow: hidden;
}

.repair-bar-progress-fill {

  border-radius: 2px;

body.light .repair-bar-inner {
  background: rgba(180, 180, 190, 0.06);
  border-color: rgba(180, 180, 190, 0.15);
  color: #374151;
}

body.light .repair-bar-headline {
  color: #312e81;
}

body.light .repair-bar-detail {
  color: #6b7280;
}

body.light .repair-bar-close {
  color: #94a3b8;
}

body.light .repair-bar-progress {
  background: rgba(180, 180, 190, 0.08);
}

/* ============================================
   轻感知状态层 — Awareness Bar
   ============================================ */
.awareness-bar {
  display: flex;
  flex-direction: row;
  justify-content: flex-end;
  align-items: center;
  gap: 6px;
  padding: 0 24px;
  min-height: 0;
  overflow: visible;
  position: relative;
  z-index: 2;
  pointer-events: none;
  background: var(--bg-chat, #161618);
}
.awareness-bar.has-balls {
  padding: 4px 24px 6px;
}
.awareness-ball {
  pointer-events: auto;
}

/* 球体基础样式 */
.awareness-ball {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  opacity: 0;
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.5), rgba(100,200,255,0.8));
  box-shadow: 0 0 6px rgba(100,200,255,0.4);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.awareness-ball:hover {
  transform: scale(1.6);
  z-index: 10;
}

/* L7 反馈规则 — 琥珀色 */
.awareness-ball.l7 {
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.6), rgba(251,191,36,0.85));
  box-shadow: 0 0 6px rgba(251,191,36,0.4);
}
.awareness-ball.l7:hover {
  box-shadow: 0 0 12px rgba(251,191,36,0.7);
}

/* L8 主动学习 — 青蓝色 */
.awareness-ball.l8-learn {
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.6), rgba(56,189,248,0.85));
  box-shadow: 0 0 6px rgba(56,189,248,0.4);
}
.awareness-ball.l8-learn:hover {
  box-shadow: 0 0 12px rgba(56,189,248,0.7);
}

/* L8 反馈重学 — 紫色 */
.awareness-ball.l8-relearn {
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.6), rgba(167,139,250,0.85));
  box-shadow: 0 0 6px rgba(167,139,250,0.4);
}
.awareness-ball.l8-relearn:hover {
  box-shadow: 0 0 12px rgba(167,139,250,0.7);
}

/* 滚入动画 */
@keyframes ballRollIn {
  0%   { opacity: 0; transform: translateX(-60vw) rotate(0deg); }
  10%  { opacity: 1; }
  100% { opacity: 1; transform: translateX(0) rotate(720deg); }
}
.awareness-ball.rolling-in {
  animation: ballRollIn 1.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}

/* 落定后呼吸光效 */
@keyframes ballBreath {
  0%, 100% { filter: brightness(1); }
  50%      { filter: brightness(1.3); }
}
.awareness-ball.settled {
  animation: ballBreath 3s ease-in-out infinite;
  opacity: 1;
}

/* 午夜清除动画 */
@keyframes ballFadeOut {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0); }
}
.awareness-ball.clearing {
  animation: ballFadeOut 0.5s ease-out forwards;
}

/* 纯CSS tooltip */
.awareness-ball::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  right: 50%;
  transform: translateX(50%);
  background: rgba(22,22,24,0.95);
  color: rgba(255,255,255,0.9);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 10px;
  line-height: 1.3;
  white-space: nowrap;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
}
.awareness-ball:hover::after {
  opacity: 1;
}

/* Light theme */
body.light .awareness-bar {
  background: #f8fafc;
}
body.light .awareness-ball::after {
  background: rgba(255,255,255,0.95);
  color: #1a1a1a;
  border: 1px solid rgba(0,0,0,0.08);
}

/* 输入区域 — 负边距上浮，悬浮在聊天内容之上 */
.input {
  background: transparent;
  border-top: none;
  padding: 0 16px 16px;
  margin-top: -40px;
  position: relative;
  z-index: 3;
}

.input-container {
  display: flex;
  gap: 0;
  align-items: stretch;
  position: relative;
  z-index: 1;
  /* 与正文 .msg 对齐：同样 90% + max 1600px，居中 */
  width: 94%;
  max-width: 1680px;
  margin: 0 auto;
}

/* 监听状态小圆点 */
.monitor-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #8a7bc8;
  animation: blink 1.5s infinite;
  flex-shrink: 0; align-self: center;
  cursor: help;
}

/* QQ监听指示器（侧边栏） */
.qq-monitor-indicator {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 10px 12px; margin-bottom: 6px;
  border-radius: 10px;
  background: rgba(138,123,200,0.1);
  border: 1px solid rgba(138,123,200,0.2);
  color: #a99de0; font-size: 12px;
  animation: monitorPulse 2s ease-in-out infinite;
  cursor: default;
  box-sizing: border-box;
}
.qq-monitor-indicator svg { opacity: 0.8; stroke: #a99de0; flex-shrink: 0; }
@keyframes monitorPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* GPT风格输入框 — 悬浮在聊天背景上 */
.inp-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(32, 32, 36, 0.55);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  transition: background 0.3s, border-color 0.3s;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
}
.inp-wrap:focus-within {
  background: rgba(32, 32, 36, 0.65);
  border-color: rgba(255, 255, 255, 0.15);
}
.input textarea {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 14px 20px;
  color: #f1f5f9;
  font-size: 14px;
  font-family: 'Microsoft YaHei UI', 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', system-ui, sans-serif;
  letter-spacing: 0;
  resize: none;
  min-height: 49px;
  max-height: 40vh;
  overflow-y: auto;
  line-height: 1.5;
  box-sizing: border-box;
  transition: none;
  box-shadow: none;
  width: 100%;
}

.input textarea:focus {
  outline: none;
  caret-color: #818cf8;
}

/* 光标呼吸微光 */
@keyframes caretGlow {
  0%, 100% { caret-color: #818cf8; }
  50% { caret-color: #6366f1; }
}
.input textarea:focus {
  animation: caretGlow 2s ease-in-out infinite;
}

.input textarea::placeholder {
  color: rgba(148, 163, 184, 0.5);
  font-weight: 400;
}

/* 输入框内滚动条 — 细、透明、跟随主题 */
.input textarea::-webkit-scrollbar {
  width: 3px;
}
.input textarea::-webkit-scrollbar-track {
  background: transparent;
}
.input textarea::-webkit-scrollbar-thumb {
  background: rgba(148, 163, 184, 0.25);
  border-radius: 3px;
}
.input textarea::-webkit-scrollbar-thumb:hover {
  background: rgba(148, 163, 184, 0.4);
}
body.light .input textarea::-webkit-scrollbar-thumb {
  background: rgba(100, 116, 139, 0.2);
}
body.light .input textarea::-webkit-scrollbar-thumb:hover {
  background: rgba(100, 116, 139, 0.35);
}

/* ===== 简约现代发送按钮 ===== */
.input-container {
  display: flex;
  gap: 0;
  align-items: stretch;
  position: relative;
}

/* 底部工具栏（图片、语音、发送按钮整合在输入框内） */
.inp-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 16px;
  border-top: none;
}
.inp-actions-spacer {
  flex: 1;
}
body.light .inp-actions {
  border-top-color: transparent;
}

.send-btn {
  width: 34px;
  height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 11px;
  background: rgba(255, 255, 255, 0.08);
  color: #c0cad8;
  cursor: pointer;
  opacity: 0.82;
  transition:
    background 0.16s ease,
    border-color 0.16s ease,
    color 0.16s ease,
    opacity 0.16s ease,
    transform 0.16s ease;
}

.send-btn.visible,
.send-btn:not(:disabled),
body.light .send-btn.visible,
body.light .send-btn:not(:disabled) {
  opacity: 1;
}

.send-btn:hover:not(:disabled) {
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(255, 255, 255, 0.2);
  color: #e2e8f0;
  transform: translateY(-1px);
}

.send-btn:active:not(:disabled) {
  transform: translateY(0);
}

.send-btn.sending {
  animation: sendPulse 0.5s ease;
}
@keyframes sendPulse {
  0% { transform: scale(1); }
  50% { transform: scale(0.92); }
  100% { transform: scale(1); }
}

.send-btn:disabled {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.1);
  color: #8793a5;
  cursor: not-allowed;
  transform: none;
  opacity: 0.62;
}

.send-btn.stop-mode {
  background: rgba(245, 158, 11, 0.16);
  border-color: rgba(251, 191, 36, 0.3);
  color: #fbbf24;
  opacity: 1;
}
.send-btn.stop-mode:hover {
  background: rgba(245, 158, 11, 0.22);
  border-color: rgba(252, 211, 77, 0.38);
  color: #fde68a;
}

.send-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2.1;
  transition: transform 0.2s;
}

.send-btn:hover:not(:disabled) svg {
  transform: translateX(1px);
}

/* 输入框不再需要为按钮留出右侧空间 */
.input textarea {
  padding-right: 20px;
}

/* 宽屏适配 */
@media (min-width: 1200px) {
}

/* 快捷键提示：仅宽屏可见 */
.inp-shortcut-hint {
  display: none;
  font-size: 11px;
  color: rgba(148, 163, 184, 0.35);
  white-space: nowrap;
  margin-right: 8px;
  user-select: none;
  letter-spacing: 0.3px;
}
@media (min-width: 1000px) {
  .inp-shortcut-hint { display: inline; }
}
body.light .inp-shortcut-hint {
  color: rgba(100, 116, 139, 0.35);
}

/* 响应式设计 */
@media (max-width: 768px) {
  .input {
    padding: 16px;
  }
  
  .input textarea {
    padding: 14px 16px;
    font-size: 16px; /* 移动端字体稍大 */
  }
  
  .send-btn {
    width: 34px;
    height: 34px;
  }
}

/* 亮色主题适配 */
body.light .input {

  border-top: none;
}

body.light .inp-wrap {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(16px);

    0 4px 24px rgba(0, 0, 0, 0.08),

}

  background: rgba(255, 255, 255, 0.92);
  border-color: rgba(148, 163, 184, 0.4);
}
body.light .input textarea {
  background: transparent;
  border: none;
  color: #161618;
  box-shadow: none;
}

body.light .input textarea:focus {
  background: transparent;
  border: none;
  box-shadow: none;
}

body.light .input textarea::placeholder {
  color: rgba(100, 116, 139, 0.45);
}

body.light .send-btn {
  background: rgba(148, 163, 184, 0.12);
  border-color: rgba(148, 163, 184, 0.28);
  color: #475569;
}

body.light .send-btn:hover:not(:disabled) {
  background: rgba(148, 163, 184, 0.18);
  border-color: rgba(100, 116, 139, 0.34);
  color: #0f172a;
}

body.light .send-btn:disabled {

}

body.light .send-btn.stop-mode:hover {
  background: rgba(245, 158, 11, 0.14);
  border-color: rgba(180, 83, 9, 0.32);

/* ===== 技能商店 ===== */
.skill-store {
  display: flex;
  flex-direction: column;
}

/* ── 统一页面大标题 ───────────────────────────── */

/* 当 .chat 内展示设置/实验/Entity 等整页内容时，
   去掉 .chat 自身的 padding，让 .chat 的滚动条天然贴右边缘。
   页面内容自己通过 .settings-page 的 padding 控制间距。 */
.chat:has(.settings-page),
.chat:has(.skill-store),
.chat:has(.stats-page),
.chat:has(#memScroll),
.chat:has(.runtime-graph-page) {
  padding: 0;
  align-items: stretch;
}

.settings-page,
.skill-store,
.stats-page,
#memScroll,
.runtime-graph-page {
  padding: 20px 28px;
  box-sizing: border-box;
  min-height: 100%;
  width: 100%;
}

.page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary, #e2e8f0);
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 0 6px 0;
}
.page-title svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  stroke-width: 1.8;
  fill: none;
  opacity: 0.55;
  flex-shrink: 0;
}

/* skill-store-title 继承 page-title，不再单独定义 */

.skill-category {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.skill-category + .skill-category {
  margin-top: 20px;
}

.skill-category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.skill-category-header svg {
  width: 18px;
  height: 18px;
  stroke: #94a3b8;
  stroke-width: 1.8;
  fill: none;
}

.skill-category-name {
  font-size: 14px;
  font-weight: 600;
  color: #94a3b8;
  letter-spacing: 0.03em;
}

.skill-category-count {
  display: none;
}

.skill-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  grid-auto-rows: 1fr;
  gap: 12px;
}

.skill-card {
  background: rgba(32,32,36,0.5);
  border: 1px solid rgba(148,163,184,0.1);
  border-radius: 14px;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-align: center;
  cursor: default;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.skill-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(79,142,247,0) 0%, rgba(79,142,247,0) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  transition: background 0.3s ease;
  pointer-events: none;
}

.skill-card:hover {
  background: rgba(32,32,36,0.75);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.skill-card:hover::before {
  background: linear-gradient(135deg, rgba(79,142,247,0.4) 0%, rgba(180,180,190,0.2) 100%);
}

.skill-card-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
}

.skill-card-icon svg {
  width: 22px;
  height: 22px;
  stroke: #9ca3af;
  stroke-width: 1.6;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.skill-card-name {
  font-size: 14px;
  font-weight: 600;
  color: #e2e8f0;
  line-height: 1.3;
}

.skill-card-desc {
  font-size: 12px;
  color: #64748b;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.skill-card-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: auto;
}

.skill-card-status .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  opacity: 0.7;
  box-shadow: none;
  flex-shrink: 0;
  align-self: center;
}

.skill-card-status .dot.offline {
  background: rgba(255,255,255,0.2);
  box-shadow: none;
}

/* ── 任务进度条（输入框上方） ──────────────────── */
.task-plan-board {
  width: 94%;
  max-width: 1680px;
  box-sizing: border-box;
  margin: 0 auto 8px;
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(15, 23, 42, 0.05);
  border: 1px solid rgba(148, 163, 184, 0.22);
}
.task-plan-head {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 10px;
}
.task-plan-goal {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}
.task-plan-phase {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.45;
}
.task-plan-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.task-plan-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  min-height: 26px;
  color: var(--text-secondary);
}
.task-plan-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.task-plan-body {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.task-plan-index {
  width: 18px;
  flex: 0 0 18px;
  font-size: 13px;
  font-weight: 700;
  line-height: 18px;
  color: var(--text-label);
  text-align: center;
}
.task-plan-title {
  font-size: 13px;
  line-height: 1.45;
  color: var(--text-primary);
  min-width: 0;
}
.task-plan-state {
  flex: 0 0 auto;
  padding: 1px 8px;
  border-radius: 999px;
  font-size: 11px;
  line-height: 1.5;
  border: 1px solid rgba(148, 163, 184, 0.18);
  color: var(--text-label);
  background: rgba(148, 163, 184, 0.08);
}
.task-plan-detail {
  font-size: 12px;
  line-height: 1.45;
  color: var(--text-secondary);
}
.task-plan-item.done .task-plan-state {
  color: #16a34a;
  border-color: rgba(34, 197, 94, 0.2);
  background: rgba(34, 197, 94, 0.1);
}
.task-plan-item.done .task-plan-title {
  color: var(--text-secondary);
}
.task-plan-item.done .task-plan-index {
  color: #22c55e;
}
.task-plan-item.running .task-plan-state {
  color: #4f46e5;
  border-color: rgba(99, 102, 241, 0.22);
  background: rgba(99, 102, 241, 0.1);
}
.task-plan-item.running .task-plan-title {
  color: var(--text-primary);
  font-weight: 600;
}
.task-plan-item.running .task-plan-index {
  color: #6366f1;
  animation: taskPlanPulse 1.4s ease-in-out infinite;
}
.task-plan-item.waiting_user .task-plan-state {
  color: #b45309;
  border-color: rgba(245, 158, 11, 0.28);
  background: rgba(245, 158, 11, 0.12);
}
.task-plan-item.waiting_user .task-plan-title {
  color: var(--text-primary);
  font-weight: 600;
}
.task-plan-item.waiting_user .task-plan-index {
  color: #d97706;
}
.task-plan-item.blocked .task-plan-state,
.task-plan-item.error .task-plan-state,
.task-plan-item.failed .task-plan-state {
  color: #dc2626;
  border-color: rgba(239, 68, 68, 0.22);
  background: rgba(239, 68, 68, 0.08);
}
.task-plan-item.blocked .task-plan-title,
.task-plan-item.error .task-plan-title,
.task-plan-item.failed .task-plan-title {
  color: #dc2626;
}
.task-plan-item.blocked .task-plan-index,
.task-plan-item.error .task-plan-index,
.task-plan-item.failed .task-plan-index {
  color: #ef4444;
}
.task-plan-item.pending .task-plan-title {
  color: var(--text-label);
}
.task-plan-item.pending .task-plan-state {
  color: var(--text-label);
}
@keyframes taskPlanPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.65; transform: scale(1.08); }
}

.task-progress-bar {
  padding: 6px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  transition: opacity 0.5s;
}
.ask-user-slot {

  font-size: 10px;
  color: #6366f1;
}

  color: #34d399;
}
.task-progress-label {
  color: var(--text-label);

/* ── 统计页面（驾驶舱） ───────────────────────────── */
.stats-page { }
.stats-page .page-title { margin-bottom: 6px; }

/* 顶部摘要卡 4 列 */
.stats-summary {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 28px;
}
.stats-summary-card {
  background: rgba(32,32,36,0.78);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 20px 16px 16px;
  display: flex; flex-direction: column; gap: 6px;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.stats-summary-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 14px 14px 0 0;
}
.stats-summary-card:nth-child(1)::before { background: linear-gradient(90deg, #6aaa88, #4a8a68); }
.stats-summary-card:nth-child(2)::before { background: linear-gradient(90deg, #6a9fd8, #4a7fb8); }
.stats-summary-card:nth-child(3)::before { background: linear-gradient(90deg, #a07bc8, #805ba8); }
.stats-summary-card:nth-child(4)::before { background: linear-gradient(90deg, #d4a853, #b48833); }
.stats-summary-card:hover { border-color: rgba(180,180,190,0.25); box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
.stats-summary-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
.stats-summary-value { font-size: 28px; font-weight: 800; color: #f8fafc; line-height: 1.1; margin: 4px 0; }
.stats-summary-hint {
  font-size: 12px; color: #6aaa88; line-height: 1.4;
  margin-top: auto; padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.stats-summary-hint.warn { color: #d4a853; }
.stats-summary-hint.bad  { color: #ef6b6b; }

/* 通用 section */
.stats-section { margin-bottom: 24px; }
.stats-section-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600; color: #94a3b8;
  margin-bottom: 12px; letter-spacing: 0.5px;
}

/* 组卡 — 一张大卡内放多行指标 */
.stats-module {
  background: rgba(32,32,36,0.78);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 16px;
  transition: border-color 0.2s;
}
.stats-module:hover { border-color: rgba(180,180,190,0.2); }
.stats-row {
  display: flex; flex-wrap: wrap; gap: 6px 20px;

}

.stats-row + .stats-row .stats-kv-val { font-size: 13px; font-weight: 500; opacity: 0.8; }

/* 运行成本左主右辅 */
.stats-cost-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.stats-cost-main { display: flex; flex-direction: column; gap: 6px; }
.stats-cost-sub {
  display: flex; flex-direction: column; gap: 4px;
  padding-left: 16px; border-left: 1px solid rgba(255,255,255,0.06);
}
.stats-kv-mini {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12px; color: #94a3b8;
}
.stats-kv-mini span:last-child { font-weight: 500; color: #cbd5e1; }
.stats-kv { display: inline-flex; align-items: baseline; gap: 4px; }
.stats-kv-label { font-size: 12px; color: #64748b; }
.stats-kv-val { font-size: 15px; font-weight: 600; color: #f8fafc; }
.stats-kv-val.big { font-size: 22px; font-weight: 700; }
.stats-kv-val.accent { color: #6aaa88; }
.stats-kv-val.amber { color: #d4a853; }
.stats-module-hint {
  margin-top: 8px; font-size: 11px; color: #6aaa88;
  padding: 6px 10px; border-radius: 8px;
  background: rgba(106,170,136,0.08);
  border: 1px solid rgba(106,170,136,0.12);
  line-height: 1.5;
}
.stats-module-hint.amber {
  color: #d4a853;
  background: rgba(180,140,60,0.08);
  border-color: rgba(180,140,60,0.12);
}

/* 记忆引擎主值 */
.stats-mem-hero {
  display: flex; align-items: baseline; gap: 10px;
  padding-bottom: 12px; margin-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

  font-size: 36px; font-weight: 800; color: #6aaa88; line-height: 1;
}

}

  display: flex; flex-wrap: wrap; gap: 6px 20px;
  align-items: baseline; margin-bottom: 10px;
}

  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 10px;
}
.stats-mem-node {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 8px;
  font-size: 12px; color: #94a3b8;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
}
.stats-mem-node.active { color: #6aaa88; border-color: rgba(106,170,136,0.25); background: rgba(106,170,136,0.08); }
.stats-mem-node.growing { color: #6a9fd8; border-color: rgba(106,159,216,0.25); background: rgba(106,159,216,0.08); }
.stats-mem-node.off { color: #64748b; opacity: 0.6; }

/* 两列并排：趋势+场景 */
.stats-dual {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}

/* 场景分布条形图 */
.stats-bars { display: flex; flex-direction: column; gap: 10px; }
.stats-bar-row { display: flex; align-items: center; gap: 6px; }
.stats-bar-label { width: 28px; font-size: 12px; color: #94a3b8; text-align: left; flex-shrink: 0; }
.stats-bar-track {
  flex: 1; height: 20px; min-width: 0;
  background: rgba(255,255,255,0.04);
  border-radius: 4px 4px 0 0; overflow: hidden;
}
.stats-bar-fill { height: 100%; border-radius: 4px 4px 0 0; transition: width 0.6s ease; }
.stats-bar-fill.chat   { background: linear-gradient(90deg, #6878a8, #8898c8); }
.stats-bar-fill.route  { background: linear-gradient(90deg, #5b8a8a, #7aabab); }
.stats-bar-fill.skill  { background: linear-gradient(90deg, #a07840, #c49a5a); }
.stats-bar-fill.learn  { background: linear-gradient(90deg, #3a7a5a, #5a9a78); }
.stats-bar-pct { width: 120px; font-size: 11px; color: #cbd5e1; text-align: left; flex-shrink: 0; white-space: nowrap; }
.stats-highlight { color: #6aaa88; }

/* 近 7 天趋势 */
.stats-trend { padding: 8px 0; }
.stats-trend-bars {
  display: flex; align-items: flex-end; gap: 6px;
  height: 90px; padding: 0 4px;
}
.stats-trend-col {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; height: 100%;
  justify-content: flex-end;
}
.stats-trend-bar {
  width: 100%; min-height: 3px;
  background: linear-gradient(180deg, #6aaa88, #3a7a5a);
  border-radius: 4px 4px 0 0; transition: height 0.4s ease;
}
.stats-trend-label { font-size: 10px; color: #64748b; white-space: nowrap; }
.stats-trend-val { font-size: 10px; color: #94a3b8; white-space: nowrap; }

/* 系统诊断 — 收尾总结区 */
.stats-section:has(.stats-diag) .stats-section-title {
  font-size: 14px; font-weight: 700; color: #cbd5e1;
  letter-spacing: 0.5px; margin-bottom: 14px;
}
.stats-diag {
  display: flex; flex-direction: column; gap: 2px;
  padding: 18px 20px; border-radius: 14px;
  background: rgba(32,32,36,0.88);
  border: 1px solid rgba(255,255,255,0.08);
}
.stats-diag-item {
  font-size: 13px; color: #e2e8f0; line-height: 1.6;

}

.stats-diag-item:first-child { font-weight: 600; font-size: 13.5px; }
.stats-diag-dot {
  width: 7px; height: 7px; border-radius: 50%;

}
.stats-diag-dot.warn { background: #d4a853; }
.stats-diag-dot.bad { background: #ef6b6b; }
.stats-diag-dot.cost { background: #6aaa88; }
.stats-diag-dot.mem { background: #8a7bc8; }
.stats-diag-dot.scene { background: #d4a853; }
.stats-diag-dot.warn.cost { background: #d4a853; }
.stats-diag-dot.warn.mem { background: #6a9fd8; }
.stats-diag-dot.warn.scene { background: #d4a853; }

/* 底部 */
.stats-footer {
  display: flex; justify-content: flex-start; align-items: center;
  margin-top: 16px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);

  line-height: 1;
}
.stats-brain-dim-val.warn  { color: #ef4444; }
.stats-brain-dim-val.amber { color: #c4a35a; }
.stats-brain-dim-label {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  margin-top: 2px;
}
.stats-brain-dim-layers {
  font-size: 10px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.02em;
}

/* 亮色适配 */
body.light .stats-brain-dim { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.08); }
body.light .stats-brain-dim.warn { border-color: rgba(239,68,68,0.2); background: rgba(239,68,68,0.04); }
body.light .stats-brain-dim.amber { border-color: rgba(180,140,60,0.18); background: rgba(180,140,60,0.04); }
body.light .stats-brain-dim-name { color: #1e293b; }
body.light .stats-brain-dim-en { color: #94a3b8; }
body.light .stats-brain-dim-val { color: #1e293b; }
body.light .stats-brain-dim-label { color: #64748b; }
body.light .stats-brain-dim-layers { color: #cbd5e1; }

/* ── 三维卡片补充：header / 状态文案 / tooltip ─────────────── */
.stats-brain-dim-header {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 1px;
}
.stats-brain-dim-status {
  font-size: 9.5px;
  color: rgba(255,255,255,0.22);
  line-height: 1.4;
  margin-top: 6px;
}
.stats-brain-dim-status.warn  { color: rgba(239,68,68,0.55); }
.stats-brain-dim-status.amber { color: rgba(196,163,90,0.55); }

/* tooltip */
.stats-brain-tip-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.stats-brain-tip-icon {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.18);
  font-size: 8px;
  color: rgba(255,255,255,0.25);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: default;
  flex-shrink: 0;
  line-height: 1;
  user-select: none;
}
.stats-brain-tip-text {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  padding: 8px 10px;
  border-radius: 8px;
  background: rgba(15,20,30,0.96);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  line-height: 1.5;
  z-index: 100;
  pointer-events: none;
  white-space: normal;
}
.stats-brain-tip-text::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: rgba(15,20,30,0.96);
}
.stats-brain-tip-wrap:hover .stats-brain-tip-text { display: block; }

/* 亮色 */
body.light .stats-brain-dim-status { color: #94a3b8; }
body.light .stats-brain-dim-status.warn { color: rgba(220,38,38,0.65); }
body.light .stats-brain-dim-status.amber { color: rgba(161,120,40,0.65); }
body.light .stats-brain-tip-icon { border-color: rgba(0,0,0,0.15); color: #94a3b8; }
body.light .stats-brain-tip-text { background: #1e293b; border-color: rgba(0,0,0,0.15); }
body.light .stats-brain-tip-text::after { border-top-color: #1e293b; }

/* 状态名颜色跟随卡片状态 */
.stats-brain-dim-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 2px; }
.stats-brain-dim-label.warn  { color: rgba(239,68,68,0.8); }
.stats-brain-dim-label.amber { color: rgba(196,163,90,0.8); }
body.light .stats-brain-dim-label { color: #475569; }
body.light .stats-brain-dim-label.warn { color: #dc2626; }
body.light .stats-brain-dim-label.amber { color: #92700a; }

/* ── 运行图谱 ───────────────────────────── */
.runtime-graph-page {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-bottom: 26px;
}

.runtime-graph-standalone-body {
  overflow: auto;
  display: block;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 30%),
    linear-gradient(180deg, #101317, #161618 48%, #13161b);
}

.runtime-graph-standalone-shell {
  width: 100%;
  max-width: 100%;
  padding: 22px 24px 28px;
}

.runtime-graph-standalone-bar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 0 4px 14px;
}

.runtime-graph-standalone-copy {
  min-width: 0;
}

.runtime-graph-standalone-title {
  font-size: 24px;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1.1;
}

.runtime-graph-standalone-note {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-label);
  margin-top: 6px;
}

.runtime-graph-standalone-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.runtime-graph-standalone-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 14px;
  border-radius: 12px;
  text-decoration: none;
  color: var(--text-primary);
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  transition: transform 0.18s, border-color 0.18s, background 0.18s;
}

.runtime-graph-standalone-link:hover {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.16);
  background: rgba(255,255,255,0.08);
}

.runtime-graph-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.runtime-graph-subtitle {
  max-width: 860px;
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-label);
  margin-top: 6px;
}

.runtime-graph-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.runtime-graph-sync-note {
  font-size: 12px;
  line-height: 1.65;
  color: var(--text-label);
  white-space: nowrap;
}

.runtime-graph-refresh {
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: var(--text-primary);
  border-radius: 12px;
  padding: 10px 16px;
  cursor: pointer;
  transition: transform 0.18s, border-color 0.18s, background 0.18s;
}

.runtime-graph-refresh.is-active {
  border-color: rgba(59,130,246,0.28);
  background: rgba(59,130,246,0.12);
  color: #dbeafe;
}

.runtime-graph-refresh:hover {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.16);
  background: rgba(255,255,255,0.08);
}

.runtime-graph-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.runtime-graph-stat {
  background: rgba(32,32,36,0.78);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: var(--shadow-card);
  min-width: 0;
}

.runtime-graph-stat.is-error {
  border-color: rgba(239,68,68,0.28);
  box-shadow: 0 10px 30px rgba(127, 29, 29, 0.16);
}

.runtime-graph-stat-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-label);
  margin-bottom: 10px;
}

.runtime-graph-stat-value {
  font-size: 28px;
  line-height: 1.05;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.runtime-graph-stat-text {
  font-size: 16px;
  line-height: 1.45;
  font-weight: 700;
}

.runtime-graph-stat-note {
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-label);
}

.runtime-graph-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 14px;
  min-height: 0;
  flex: 1;
  align-items: start;
}

.runtime-graph-sidebar {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 0;
  grid-column: 2;
  grid-row: 1;
  width: 320px;
  max-width: 320px;
}

.runtime-graph-panel {
  background: rgba(32,32,36,0.72);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 14px;
  box-shadow: var(--shadow-card);
  min-height: 0;
}

.runtime-graph-panel-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}

.runtime-graph-panel-subtitle {
  font-size: 12px;
  color: var(--text-label);
  line-height: 1.7;
  margin-top: 4px;
  margin-bottom: 12px;
}

#runtimeGraphRuns,
#runtimeGraphSteps {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
}

#runtimeGraphRuns {
  gap: 8px;
  max-height: calc(100vh - 300px);
  overflow: auto;
  padding-right: 2px;
}

#runtimeGraphSteps {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
  align-items: stretch;
}

.runtime-run-card {
  width: 100%;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  border-radius: 14px;
  padding: 10px;
  color: var(--text-primary);
  text-align: left;
  cursor: pointer;
  transition: transform 0.18s, border-color 0.18s, background 0.18s, box-shadow 0.18s;
}

.runtime-run-card:hover {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.16);
  background: rgba(255,255,255,0.06);
}

.runtime-run-card.is-active {
  border-color: rgba(59,130,246,0.42);
  box-shadow: 0 12px 28px rgba(37,99,235,0.18);
}

.runtime-run-card.is-error {
  border-color: rgba(239,68,68,0.22);
}

.runtime-run-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.runtime-run-time {
  font-size: 11px;
  color: var(--text-label);
}

.runtime-run-state {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 999px;
  background: rgba(255,255,255,0.07);
}

.runtime-run-preview {
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.runtime-run-meta {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 6px;
  font-size: 10px;
  line-height: 1.55;
  color: var(--text-label);
}

.runtime-run-meta strong {
  color: var(--text-secondary);
  font-weight: 600;
}

.runtime-run-meta.danger strong {
  color: #fca5a5;
}

.runtime-step-row {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 10px;
  align-items: flex-start;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  padding: 10px 12px;
  min-height: 100%;
}

.runtime-step-row.is-error {
  border-color: rgba(239,68,68,0.22);
  background: rgba(127,29,29,0.16);
}

.runtime-step-index {
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

.runtime-step-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
}

.runtime-step-detail {
  font-size: 12px;
  line-height: 1.75;
  color: var(--text-secondary);
  margin-top: 4px;
}

.runtime-step-targets {
  font-size: 11px;
  line-height: 1.6;
  color: var(--text-label);
  margin-top: 6px;
}

.runtime-graph-main {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
  grid-column: 1;
  grid-row: 1;
}

.runtime-graph-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 0 2px;
}

.runtime-graph-toolbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.runtime-graph-status {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.7;
}

.runtime-graph-mode-switch {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
}

.runtime-graph-mode-btn {
  min-height: 34px;
  padding: 0 12px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--text-label);
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  transition: background 0.18s, color 0.18s, transform 0.18s;
}

.runtime-graph-mode-btn:hover:not(:disabled) {
  color: var(--text-primary);
}

.runtime-graph-mode-btn.is-active {
  background: rgba(59,130,246,0.18);
  color: #dbeafe;
}

.runtime-graph-mode-btn:disabled {
  opacity: 0.42;
  cursor: not-allowed;
}

.runtime-graph-legend {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text-label);
}

.runtime-graph-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
  margin-right: 6px;
  vertical-align: middle;
}

.runtime-graph-dot.runtime { background: #0f766e; }
.runtime-graph-dot.active { background: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.4); }
.runtime-graph-dot.error { background: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,0.4); }

.runtime-graph-viewport {
  position: relative;
  min-height: 720px;
  overflow: auto;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  background:
    radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
    radial-gradient(circle at bottom right, rgba(245,158,11,0.08), transparent 24%),
    linear-gradient(180deg, rgba(15,23,42,0.65), rgba(17,24,39,0.48));
  box-shadow: var(--shadow-card);
}

.runtime-graph-flow-panel {
  background: rgba(32,32,36,0.72);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 14px;
  box-shadow: var(--shadow-card);
}

.runtime-graph-flow-panel.is-hidden {
  display: none;
}

.runtime-graph-flow-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}

.runtime-graph-flow-mode {
  flex: 0 0 auto;
  min-height: 32px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-label);
}

.runtime-graph-flow-mode.is-focus {
  border-color: rgba(59,130,246,0.28);
  background: rgba(59,130,246,0.12);
  color: #dbeafe;
}

.runtime-graph-flow-meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.runtime-graph-flow-chip {
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  padding: 10px 12px;
  min-width: 0;
}

.runtime-graph-flow-chip.is-error {
  border-color: rgba(239,68,68,0.22);
  background: rgba(127,29,29,0.16);
}

.runtime-graph-flow-chip-label {
  display: block;
  font-size: 11px;
  line-height: 1.5;
  color: var(--text-label);
  margin-bottom: 4px;
}

.runtime-graph-flow-chip strong {
  display: block;
  font-size: 12px;
  line-height: 1.65;
  color: var(--text-primary);
  font-weight: 700;
}

.runtime-graph-stage {
  position: relative;
  min-width: 100%;
  min-height: 100%;
}

.runtime-graph-stage.is-focus {
  overflow: hidden;
}

.runtime-graph-canvas {
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: top left;
}

.runtime-graph-links {
  position: absolute;
  left: 0;
  top: 0;
  pointer-events: none;
  overflow: visible;
}

.runtime-link {
  fill: none;
  stroke-linecap: round;
  stroke-width: 1.35;
  opacity: 0.28;
}

.runtime-link-import { stroke: rgba(148,163,184,0.52); }
.runtime-link-asset { stroke: rgba(99,102,241,0.44); }
.runtime-link-api { stroke: rgba(249,115,22,0.42); }

.runtime-link-live {
  stroke: rgba(59,130,246,0.92);
  stroke-width: 2.7;
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(59,130,246,0.38));
  stroke-dasharray: 10 8;
  animation: runtimeGraphFlow 1.4s linear infinite;
}

@keyframes runtimeGraphFlow {
  from { stroke-dashoffset: 0; }
  to { stroke-dashoffset: -36; }
}

.runtime-graph-group {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 22px;
  backdrop-filter: blur(12px);
}

.runtime-graph-group-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px 0;
}

.runtime-graph-group-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}

.runtime-graph-group-count {
  font-size: 11px;
  color: var(--text-label);
}

.runtime-graph-node {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(15,23,42,0.56);
  border-radius: 14px;
  padding: 8px 10px;
  text-align: left;
  color: var(--text-primary);
  cursor: pointer;
  transition: transform 0.16s, box-shadow 0.16s, border-color 0.16s, background 0.16s;
  overflow: hidden;
}

.runtime-graph-node:hover {
  transform: translateY(-1px);
  box-shadow: 0 12px 20px rgba(15,23,42,0.18);
  background: rgba(15,23,42,0.72);
}

.runtime-graph-node.is-active {
  border-color: rgba(59,130,246,0.7) !important;
  box-shadow: 0 0 0 1px rgba(59,130,246,0.3), 0 12px 26px rgba(37,99,235,0.22);
  background: linear-gradient(180deg, rgba(30,41,59,0.84), rgba(15,23,42,0.8));
}

.runtime-graph-node.is-error {
  border-color: rgba(239,68,68,0.78) !important;
  box-shadow: 0 0 0 1px rgba(239,68,68,0.24), 0 12px 28px rgba(127,29,29,0.24);
}

.runtime-graph-node.is-runtime {
  background: linear-gradient(180deg, rgba(15,118,110,0.26), rgba(15,23,42,0.72));
}

.runtime-graph-node.is-external {
  background: linear-gradient(180deg, rgba(202,138,4,0.22), rgba(15,23,42,0.72));
}

.runtime-node-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.runtime-node-subtitle,
.runtime-node-path {
  font-size: 10px;
  line-height: 1.45;
  color: var(--text-label);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 4px;
}

.runtime-node-tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 18px;
  padding: 0 7px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: var(--text-label);
  font-size: 10px;
  font-weight: 700;
  margin-bottom: 6px;
}

.runtime-node-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.runtime-node-status {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 18px;
  padding: 0 7px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: var(--text-label);
  font-size: 10px;
  font-weight: 700;
}

.runtime-node-status.is-active {
  background: rgba(59,130,246,0.18);
  color: #dbeafe;
}

.runtime-node-status.is-error {
  background: rgba(239,68,68,0.18);
  color: #fecaca;
}

.runtime-node-detail {
  font-size: 10px;
  line-height: 1.45;
  color: var(--text-secondary);
  margin-top: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.runtime-node-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 7px;
  font-size: 10px;
  line-height: 1.4;
  color: var(--text-label);
}

.runtime-node-foot-label {

<script>
// ── 窗口控制兼容层：自动检测 Electron / pywebview / 浏览器 ──
var _isElectron = typeof window.novaShell !== 'undefined';
var _isPywebview = typeof window.pywebview !== 'undefined';
var _usesNativeWindowControls = !!(_isElectron && window.novaShell && window.novaShell.windowControlsMode === 'native-overlay');
var _windowShell = document.getElementById('windowShell');

if (_usesNativeWindowControls) {
  document.body.classList.add('native-window-controls');
}

function _applyWindowState(state){
  if(!_windowShell)return;
  var maximized=!!(state&&state.maximized);
  var fullscreen=!!(state&&state.fullscreen);
  _windowShell.classList.toggle('is-maximized',maximized||fullscreen);
}

if(_isElectron&&window.novaShell.onWindowState){
  window.novaShell.onWindowState(_applyWindowState);
}

function _winMinimize() {
  if (_isElectron) window.novaShell.minimize();
  else if (_isPywebview) window.pywebview.api.minimize();
}
function _winMaximize() {
  if (_isElectron) window.novaShell.maximize();
  else if (_isPywebview) window.pywebview.api.toggle_maximize();
}
function _winClose() {
  if (_isElectron) window.novaShell.close();
  else if (_isPywebview) window.pywebview.api.close_window();
}

// 顶部栏拖拽 + 双击最大化（纯 JS 实现，不依赖 CSS app-region）
(function(){
  if(_usesNativeWindowControls)return;
  var bar=document.getElementById('topBar');
  if(!bar)return;
  var dragging=false, lastX=0, lastY=0;
  var lastClickTime=0;

  bar.addEventListener('mousedown',function(e){
    if(e.target.closest('button'))return;
    // 双击检测
    var now=Date.now();
    if(now-lastClickTime<300){
      _winMaximize();
      lastClickTime=0;
      return;
    }
    lastClickTime=now;
    // 开始拖拽
    dragging=true;
    lastX=e.screenX;
    lastY=e.screenY;
    e.preventDefault();
  });

  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    var dx=e.screenX-lastX;
    var dy=e.screenY-lastY;
    lastX=e.screenX;

function formatBubbleText(text){
 var raw=String(text||'');
 var lines=raw.split('\n');
 var html=[];
 var inCode=false, codeLines=[];
 var inList=false, listType='';

 function flushCode(){
  if(!inCode) return;
  html.push('<pre class="bubble-code"><code>'+escapeHtml(codeLines.join('\n'))+'</code></pre>');
  codeLines=[];
  inCode=false;
 }

 function flushList(){
  if(!inList) return;
  html.push(listType==='ol'?'</ol>':'</ul>');
  inList=false;
  listType='';
 }

 function fmtInline(s){
  s=escapeHtml(s);
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/`([^`]+)`/g,'<code class="bubble-inline-code">$1</code>');
  return s;
 }

 for(var i=0;i<lines.length;i++){
  var line=lines[i];
  var trimmed=line.trim();

  if(trimmed.startsWith('```')){
   if(inCode){ flushCode(); }
   else{ flushList(); inCode=true; codeLines=[]; }
   continue;
  }
  if(inCode){ codeLines.push(line); continue; }

  if(!trimmed){ flushList(); html.push('<div class="bubble-spacer"></div>'); continue; }

  var hm=trimmed.match(/^(#{1,3})\s+(.+)$/);
  if(hm){ flushList(); html.push('<div class="bubble-h'+hm[1].length+'">'+fmtInline(hm[2])+'</div>'); continue; }

  if(trimmed.startsWith('> ')){ flushList(); html.push('<blockquote class="bubble-quote">'+fmtInline(trimmed.slice(2))+'</blockquote>'); continue; }

  var ulm=trimmed.match(/^[-*]\s+(.+)$/);
  if(ulm){
   if(!inList||listType!=='ul'){ flushList(); html.push('<ul class="bubble-ul">'); inList=true; listType='ul'; }
   html.push('<li>'+fmtInline(ulm[1])+'</li>');
   continue;
  }

  var olm=trimmed.match(/^\d+[.)]\s+(.+)$/);
  if(olm){
   if(!inList||listType!=='ol'){ flushList(); html.push('<ol class="bubble-ol">'); inList=true; listType='ol'; }
   html.push('<li>'+fmtInline(olm[1])+'</li>');
   continue;
  }

  flushList();
  html.push('<div class="bubble-p">'+fmtInline(trimmed)+'</div>');
 }

 flushCode();
 flushList();
 return html.join('');
}

function escapeHtml(text){
 return String(text||'')
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;')
  .replace(/'/g,'&#39;');
}

function cleanInlineText(text, limit){
 var cleaned=String(text||'').replace(/\s+/g,' ').trim();
 if(!cleaned) return '';
 if(limit && cleaned.length>limit) return cleaned.slice(0, Math.max(limit-1, 1))+'\u2026';
 return cleaned;
}

 if(inputArea) inputArea.style.display=visible?'block':'none';
 var awarenessBar=document.getElementById('awarenessBar');
 if(awarenessBar) awarenessBar.style.display=visible?'':'none';
}

 var MAX_BALLS=50;

 var TYPE_CLASS={'l7_feedback':'l7','l8_learn':'l8-learn','l8_relearn':'l8-relearn'};
 var TYPE_LABEL={'l7_feedback':'\u53cd\u9988\u8c03\u6574','l8_learn':'\u5b66\u4e60','l8_relearn':'\u91cd\u5b66'};

 function todayKey(){return new Date().toISOString().slice(0,10);}

 function loadBalls(){
  try{
   var raw=localStorage.getItem(STORAGE_KEY);
   if(!raw) return [];
   var data=JSON.parse(raw);
   if(data.date!==todayKey()){localStorage.removeItem(STORAGE_KEY);return [];}
   return data.balls||[];
  }catch(e){return [];}
 }

 function saveBalls(balls){
  localStorage.setItem(STORAGE_KEY,JSON.stringify({date:todayKey(),balls:balls}));
 }

 function addBallToStorage(ballData){
  var balls=loadBalls();
  if(balls.length>=MAX_BALLS) return false;
  for(var i=0;i<balls.length;i++){
   if(balls[i].ts===ballData.ts && balls[i].type===ballData.type) return false;
  }
  balls.push(ballData);
  saveBalls(balls);
  return true;
 }

  if(!bar) return;
  if(bar.querySelectorAll('.awareness-ball').length>0){
