<!DOCTYPE html>
<html class="theme-light">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>AaronCore 运行图谱</title>
<link rel="stylesheet" href="/static/css/main.css?v=20260413theme157">
</head>
<body class="light runtime-graph-standalone-body">
 <div class="runtime-graph-standalone-shell">
  <div class="runtime-graph-standalone-bar">
   <div class="runtime-graph-standalone-copy">
    <div class="runtime-graph-standalone-title">Runtime Graph</div>
    <div class="runtime-graph-standalone-note">Runtime route graph and event trace for quick diagnostics.</div>
   </div>
   <div class="runtime-graph-standalone-actions">
    <a class="runtime-graph-standalone-link" href="/" target="_blank" rel="noopener">Open Home</a>
    <a class="runtime-graph-standalone-link" href="/runtime_graph?limit=12" target="_blank" rel="noopener">Open Raw JSON</a>
   </div>
  </div>
  <div id="runtimeGraphStandaloneRoot"></div>
 </div>
 <script>
 (function(){
  var savedMode = localStorage.getItem('nova_theme') || localStorage.getItem('novaTheme') || 'light';
  savedMode = String(savedMode || '').toLowerCase();
  if(savedMode!=='dark' && savedMode!=='system') savedMode='light';
  var savedTheme = savedMode==='system'
   ? (((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'))
   : savedMode;
  document.body.classList.remove('light','dark');
  document.body.classList.add(savedTheme === 'dark' ? 'dark' : 'light');
  document.body.setAttribute('data-theme-mode', savedMode);
  document.documentElement.classList.remove('theme-light','theme-dark');
  document.documentElement.classList.add(savedTheme === 'dark' ? 'theme-dark' : 'theme-light');
  document.documentElement.setAttribute('data-theme-mode', savedMode);
 })();
 </script>
 <script src="/static/js/runtime_graph.js?v=20260331-graph9"></script>
</body>
</html>
