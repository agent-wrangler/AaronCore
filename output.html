<html class="theme-light"><head><meta charset="UTF-8"><title>AaronCore</title>

<script>
(function(){
 var t = 'light';
 var mode = 'light';
 var html = document.documentElement;
 if(html&&html.classList){
  html.classList.add('theme-booting');
 }
 try{
  mode = localStorage.getItem('nova_theme') || localStorage.getItem('novaTheme') || 'light';
  mode = String(mode || '').toLowerCase();
  if(mode!=='dark' && mode!=='system') mode='light';
  t = mode==='system'
   ? (((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'))
   : mode;
  if(html&&html.classList){
   html.classList.remove('theme-light','theme-dark');
   html.classList.add(t === 'dark' ? 'theme-dark' : 'theme-light');
   html.setAttribute('data-theme-mode', mode);
  }
 }catch(e){}
 requestAnimationFrame(function(){
  requestAnimationFrame(function(){
   if(html&&html.classList){
    html.classList.remove('theme-booting');
   }
  });
 });
})();
</script>
</head>
<body class="light">
<script>
(function(){
 var t = 'light';
 var mode = 'light';
 try{
  mode = localStorage.getItem('nova_theme') || localStorage.getItem('novaTheme') || 'light';
  mode = String(mode || '').toLowerCase();
  if(mode!=='dark' && mode!=='system') mode='light';
  t = mode==='system'
   ? (((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'))
   : mode;
  var html = document.documentElement;
  var body = document.body;
  if(html&&html.classList){
   html.classList.remove('theme-light','theme-dark');
   html.classList.add(t === 'dark' ? 'theme-dark' : 'theme-light');
   html.setAttribute('data-theme-mode', mode);
  }
  if(body&&body.classList){
   body.classList.remove('light','dark');
   body.classList.add(t);
   body.setAttribute('data-theme-mode', mode);
  }
 }catch(e){}
})();
</script>
