name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (Windows / py3.11 / desktop)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run smoke regression suite
        run: python -m unittest tests.test_chat_run_helpers tests.test_task_continuity tests.test_memory_tool_runtime tests.test_desktop_shell_paths

  extended:
    name: Extended (Windows / py3.11 / runtime)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install extended test dependencies
        run: |
          python -m pip install requests pillow

      - name: Run extended runtime regression suite
        run: python -m unittest tests.test_model_runtime tests.test_chat_image_bridge tests.test_tool_call_runtime tests.test_vision_local_bridge tests.test_frontend_image_upload_bridge

  desktop-build:
    name: Desktop Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop_runtime_35
        run: npm install

      - name: Build unpacked desktop shell
        working-directory: desktop_runtime_35
        run: npm run pack:thin
