name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (Windows / py3.11 / runtime)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run smoke regression suite
        run: python scripts/run_ci_unittest.py smoke

  extended:
    name: Extended (Windows / py3.11 / runtime)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .github/requirements/extended.txt

      - name: Install extended test dependencies
        run: |
          python -m pip install -r .github/requirements/extended.txt

      - name: Run extended runtime regression suite
        run: python scripts/run_ci_unittest.py extended

  desktop-build:
    name: Desktop Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop_runtime_35
        run: npm install

      - name: Build unpacked desktop shell
        working-directory: desktop_runtime_35
        run: npm run pack:thin
