name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (Windows / py3.11 / desktop)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run smoke regression suite
        run: |
          @'
          import sys
          import unittest

          patterns = [
              "test_chat_run_helpers.py",
              "test_task_continuity.py",
              "test_memory_tool_runtime.py",
              "test_desktop_shell_paths.py",
          ]

          loader = unittest.defaultTestLoader
          suite = unittest.TestSuite()
          for pattern in patterns:
              suite.addTests(loader.discover("tests", pattern=pattern))

          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          '@ | python -

  extended:
    name: Extended (Windows / py3.11 / runtime)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install extended test dependencies
        run: |
          python -m pip install requests pillow

      - name: Run extended runtime regression suite
        run: |
          @'
          import sys
          import unittest

          patterns = [
              "test_model_runtime.py",
              "test_chat_image_bridge.py",
              "test_tool_call_runtime.py",
              "test_vision_local_bridge.py",
              "test_frontend_image_upload_bridge.py",
          ]

          loader = unittest.defaultTestLoader
          suite = unittest.TestSuite()
          for pattern in patterns:
              suite.addTests(loader.discover("tests", pattern=pattern))

          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          '@ | python -

  desktop-build:
    name: Desktop Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop_runtime_35
        run: npm install

      - name: Build unpacked desktop shell
        working-directory: desktop_runtime_35
        run: npm run pack:thin
