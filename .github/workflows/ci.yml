name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows / py3.11 / desktop
            os: windows-latest
            python-version: "3.11"
            test_args: tests/test_chat_run_helpers.py tests/test_task_continuity.py tests/test_memory_tool_runtime.py tests/test_desktop_shell_paths.py
          - label: Windows / py3.12
            os: windows-latest
            python-version: "3.12"
            test_args: tests/test_chat_run_helpers.py tests/test_task_continuity.py tests/test_memory_tool_runtime.py
          - label: Ubuntu / py3.11
            os: ubuntu-latest
            python-version: "3.11"
            test_args: tests/test_chat_run_helpers.py tests/test_task_continuity.py tests/test_memory_tool_runtime.py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        if: contains(matrix.test_args, 'test_desktop_shell_paths.py')
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run smoke regression suite
        run: python -m pytest -q ${{ matrix.test_args }}

  extended:
    name: Extended (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows / py3.11 / runtime
            os: windows-latest
            python-version: "3.11"
          - label: Ubuntu / py3.11 / runtime
            os: ubuntu-latest
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install extended test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pillow

      - name: Run extended runtime regression suite
        run: >
          python -m pytest -q
          tests/test_model_runtime.py
          tests/test_chat_image_bridge.py
          tests/test_tool_call_runtime.py
          tests/test_vision_local_bridge.py
          tests/test_frontend_image_upload_bridge.py

  desktop-build:
    name: Desktop Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop_runtime_35
        run: npm install

      - name: Build unpacked desktop shell
        working-directory: desktop_runtime_35
        run: npm run pack:thin
